<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizzes | SSC Hustlers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Poppins',sans-serif; background:#f5f6fa; color:#1a1a2e; }
nav { background:#1a1a2e; padding:0 5%; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.logo { font-size:1.2rem; font-weight:800; color:#e63946; text-decoration:none; }
.logo span { color:#fff; }
.nav-right { display:flex; gap:12px; align-items:center; }
.user-name-nav { font-size:0.82rem; color:rgba(255,255,255,0.7); }
.btn-back-nav { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:7px 16px; border-radius:8px; font-size:0.82rem; font-weight:600; text-decoration:none; }
.container { max-width:900px; margin:0 auto; padding:28px 5%; }
.page-header { margin-bottom:22px; }
.page-header h1 { font-size:1.4rem; font-weight:800; margin-bottom:4px; }
.page-header h1 span { color:#e63946; }
.page-header p { color:#888; font-size:0.85rem; }

/* EXAM TABS */
.exam-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.exam-tab { padding:9px 20px; border-radius:50px; border:2px solid #e8e8e8; background:#fff; font-size:0.82rem; font-weight:700; cursor:pointer; font-family:inherit; color:#666; transition:all 0.2s; }
.exam-tab:hover { border-color:#e63946; color:#e63946; }
.exam-tab.active { border-color:#e63946; background:#e63946; color:#fff; }

/* BREADCRUMB */
.breadcrumb { display:flex; align-items:center; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
.bc-btn { font-size:0.8rem; font-weight:700; color:#e63946; cursor:pointer; background:#fff5f5; border:1px solid rgba(230,57,70,0.2); padding:4px 12px; border-radius:20px; transition:all 0.2s; }
.bc-btn:hover { background:#e63946; color:#fff; }
.bc-current { font-size:0.8rem; font-weight:700; color:#888; padding:4px 12px; }
.bc-sep { color:#ccc; }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }
.view-title { font-size:1rem; font-weight:800; margin-bottom:16px; }
.view-title span { color:#e63946; }

/* SUBJECT CARDS */
.subject-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:14px; }
.subject-card { background:#fff; border-radius:16px; padding:20px 18px; border:2px solid #f0f0f0; cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden; }
.subject-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--clr); }
.subject-card:hover { border-color:var(--clr); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
.subject-card.maths    { --clr:#e63946; }
.subject-card.english  { --clr:#4285f4; }
.subject-card.reasoning{ --clr:#00c853; }
.subject-card.ga       { --clr:#ffb300; }
.subject-card.ca       { --clr:#9c27b0; }
.sc-icon  { font-size:2rem; margin-bottom:10px; }
.sc-name  { font-size:0.9rem; font-weight:800; margin-bottom:4px; }
.sc-count { font-size:0.75rem; color:#aaa; margin-bottom:12px; min-height:18px; }
.btn-open-subj { width:100%; padding:8px; border-radius:8px; background:var(--clr); color:#fff; border:none; font-size:0.8rem; font-weight:700; cursor:pointer; font-family:inherit; }

/* TEST LIST */
.test-list { display:flex; flex-direction:column; gap:10px; }
.test-card { background:#fff; border-radius:14px; padding:16px 18px; border:2px solid #f0f0f0; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.test-card:hover { border-color:#e63946; transform:translateX(4px); box-shadow:0 4px 16px rgba(0,0,0,0.07); }
.test-card-left { flex:1; min-width:0; }
.test-serial { font-size:0.68rem; font-weight:700; color:#e63946; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.test-name { font-size:0.92rem; font-weight:800; color:#1a1a2e; margin-bottom:7px; }
.test-tags { display:flex; gap:6px; flex-wrap:wrap; }
.ttag { padding:2px 9px; border-radius:50px; font-size:0.68rem; font-weight:700; background:#f5f5f5; color:#666; }
.ttag.red   { background:#fff0f0; color:#e63946; }
.ttag.green { background:#f0fff4; color:#00a040; }
.ttag.blue  { background:#e8f0fe; color:#4285f4; }
.btn-start-test { background:#e63946; color:#fff; border:none; padding:9px 18px; border-radius:10px; font-size:0.82rem; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0; }
.btn-start-test:hover { background:#c1121f; }

.empty-box { background:#fff; border-radius:16px; padding:48px 20px; text-align:center; border:2px dashed #e8e8e8; }
.empty-box div { font-size:2.5rem; margin-bottom:12px; }
.empty-box p { color:#aaa; font-size:0.85rem; line-height:1.6; }
.loading-box { text-align:center; padding:40px; color:#aaa; font-size:0.85rem; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid #e8e8e8; border-top-color:#e63946; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ========== QUIZ MODAL ========== */
.quiz-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:200; overflow-y:auto; padding:20px; }
.quiz-overlay.show { display:flex; align-items:flex-start; justify-content:center; }
.quiz-modal { background:#fff; border-radius:20px; width:100%; max-width:720px; margin:auto; overflow:hidden; animation:popIn 0.3s ease; }
@keyframes popIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.quiz-header { background:#1a1a2e; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.quiz-title { font-size:0.88rem; font-weight:700; color:#fff; }
.quiz-title span { color:#e63946; }
.quiz-meta-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.quiz-timer { background:rgba(230,57,70,0.2); color:#e63946; padding:5px 14px; border-radius:50px; font-size:0.88rem; font-weight:800; border:1px solid rgba(230,57,70,0.3); min-width:68px; text-align:center; }
.quiz-progress-text { font-size:0.78rem; color:rgba(255,255,255,0.6); }
.btn-exit { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.2); padding:6px 14px; border-radius:8px; font-size:0.78rem; cursor:pointer; font-family:inherit; }
.quiz-progress-bar { height:4px; background:#f0f0f0; }
.quiz-progress-fill { height:100%; background:#e63946; transition:width 0.3s; }
.q-nav-dots { display:flex; gap:6px; flex-wrap:wrap; padding:12px 20px 6px; }
.q-dot { width:28px; height:28px; border-radius:8px; font-size:0.72rem; font-weight:700; cursor:pointer; border:2px solid #e8e8e8; background:#fff; color:#666; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.q-dot.answered { background:#e63946; border-color:#e63946; color:#fff; }
.q-dot.current { border-color:#1a1a2e; }
.quiz-body { padding:20px 22px 14px; }
.q-number { font-size:0.72rem; font-weight:700; color:#e63946; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.q-text { font-size:0.92rem; font-weight:600; line-height:1.7; margin-bottom:18px; white-space:pre-line; }
.options-list { display:flex; flex-direction:column; gap:9px; margin-bottom:18px; }
.option-btn { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px; border:2px solid #e8e8e8; background:#fff; font-size:0.86rem; font-family:inherit; cursor:pointer; transition:all 0.15s; text-align:left; width:100%; }
.option-btn:hover:not(:disabled) { border-color:#e63946; background:#fff5f5; }
.option-label { width:28px; height:28px; border-radius:50%; background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:800; flex-shrink:0; transition:all 0.15s; }
.option-btn.selected { border-color:#e63946; background:#fff5f5; }
.option-btn.selected .option-label { background:#e63946; color:#fff; }
.option-btn.correct { border-color:#00c853; background:#f0fff4; }
.option-btn.correct .option-label { background:#00c853; color:#fff; }
.option-btn.wrong { border-color:#e63946; background:#fff0f0; }
.option-btn.wrong .option-label { background:#e63946; color:#fff; }
.option-btn:disabled { cursor:default; }
.explanation-box { background:#f0fff4; border:1px solid #b7f0c8; border-radius:10px; padding:13px 15px; font-size:0.8rem; line-height:1.6; color:#333; margin-bottom:14px; display:none; }
.explanation-box.show { display:block; }
.explanation-box strong { color:#00a040; }
.quiz-footer { padding:14px 20px; border-top:1px solid #f0f0f0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.marking-info-row { font-size:0.73rem; color:#888; }
.marking-info-row span { font-weight:700; }
.quiz-nav { display:flex; gap:8px; }
.btn-prev,.btn-next,.btn-submit { padding:9px 18px; border-radius:10px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; border:none; }
.btn-prev { background:#f5f5f5; color:#666; border:1px solid #e8e8e8; }
.btn-next { background:#e63946; color:#fff; }
.btn-submit { background:#00c853; color:#fff; }
.result-screen { padding:28px 22px; text-align:center; display:none; }
.result-screen.show { display:block; }
.result-icon { font-size:3.5rem; margin-bottom:14px; }
.result-title { font-size:1.3rem; font-weight:800; margin-bottom:6px; }
.result-score { font-size:2.4rem; font-weight:800; color:#e63946; margin:14px 0 4px; }
.result-sub { font-size:0.83rem; color:#888; margin-bottom:22px; }
.result-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:22px; }
.r-stat { background:#f5f6fa; border-radius:12px; padding:14px; }
.r-stat-val { font-size:1.2rem; font-weight:800; }
.r-stat-label { font-size:0.7rem; color:#888; margin-top:2px; }
.r-correct .r-stat-val { color:#00c853; }
.r-wrong .r-stat-val   { color:#e63946; }
.r-skip .r-stat-val    { color:#888; }
.btn-retry,.btn-done { padding:11px 24px; border-radius:10px; font-size:0.88rem; font-weight:700; cursor:pointer; font-family:inherit; border:none; margin:5px; }
.btn-retry { background:#f5f5f5; color:#333; border:1px solid #e8e8e8; }
.btn-done  { background:#e63946; color:#fff; }
@media(max-width:600px) {
  .subject-grid { grid-template-columns:1fr 1fr; }
  .quiz-body { padding:14px 14px 10px; }
  .quiz-footer { padding:10px 14px; }
  .q-nav-dots { padding:10px 14px 4px; }
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="dashboard.html">SSC <span>HUSTLERS</span></a>
  <div class="nav-right">
    <span class="user-name-nav" id="userNameNav">...</span>
    <a class="btn-back-nav" href="dashboard.html">← Dashboard</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>📝 Practice <span>Quizzes</span></h1>
    <p>Exam → Subject → Test choose karo aur practice shuru karo</p>
  </div>

  <!-- EXAM TABS -->
  <div class="exam-tabs">
    <button class="exam-tab active" onclick="switchExam('ssc_cgl',this)">🎯 SSC CGL</button>
    <button class="exam-tab" onclick="switchExam('ssc_chsl',this)">📘 SSC CHSL</button>
    <button class="exam-tab" onclick="switchExam('ssc_mts',this)">📗 SSC MTS</button>
    <button class="exam-tab" onclick="switchExam('ssc_gd',this)">🛡️ SSC GD</button>
    <button class="exam-tab" onclick="switchExam('ntpc',this)">🚂 NTPC</button>
  </div>

  <!-- BREADCRUMB -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- VIEW: SUBJECTS -->
  <div class="view active" id="view-subjects">
    <div class="view-title">Subject <span>Choose Karo</span></div>
    <div class="subject-grid" id="subjectGrid"></div>
  </div>

  <!-- VIEW: TEST LIST -->
  <div class="view" id="view-tests">
    <div class="view-title" id="testsTitle">Tests</div>
    <div id="testList"></div>
  </div>
</div>

<!-- ========== QUIZ MODAL ========== -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-modal">
    <div class="quiz-header">
      <div class="quiz-title" id="quizTitle">Quiz</div>
      <div class="quiz-meta-row">
        <div class="quiz-timer" id="quizTimer">--:--</div>
        <div class="quiz-progress-text" id="quizProgressText">0/0</div>
        <button class="btn-exit" onclick="exitQuiz()">✕ Exit</button>
      </div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill"></div></div>
    <div class="q-nav-dots" id="qNavDots"></div>
    <div class="quiz-body" id="quizBody">
      <div class="q-number" id="qNumber">Question 1</div>
      <div class="q-text" id="qText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="explanation-box" id="explanationBox"><strong>💡 Explanation:</strong> <span id="explanationText"></span></div>
    </div>
    <div class="quiz-footer" id="quizFooter">
      <div class="marking-info-row">✅ <span id="mPos">+1</span> &nbsp;❌ <span id="mNeg">-0</span></div>
      <div class="quiz-nav">
        <button class="btn-prev" id="btnPrev" onclick="prevQ()">← Prev</button>
        <button class="btn-next" id="btnNext" onclick="nextQ()">Next →</button>
        <button class="btn-submit" id="btnSubmit" onclick="submitQuiz()" style="display:none;">✅ Submit</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <div class="result-icon" id="resultIcon">🎉</div>
      <div class="result-title" id="resultTitle">Test Complete!</div>
      <div class="result-score" id="resultScore">0</div>
      <div class="result-sub" id="resultSub">out of 0 marks</div>
      <div class="result-stats">
        <div class="r-stat r-correct"><div class="r-stat-val" id="rCorrect">0</div><div class="r-stat-label">Correct</div></div>
        <div class="r-stat r-wrong"><div class="r-stat-val" id="rWrong">0</div><div class="r-stat-label">Wrong</div></div>
        <div class="r-stat r-skip"><div class="r-stat-val" id="rSkip">0</div><div class="r-stat-label">Skipped</div></div>
      </div>
      <div>
        <button class="btn-retry" onclick="retryQuiz()">🔁 Retry</button>
        <button class="btn-done" onclick="exitQuiz()">✅ Done</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wwfhoyxqlversdkdqcgd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZmhveXhxbHZlcnNka2RxY2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDAwMTMsImV4cCI6MjA4ODQ3NjAxM30.qaQp8LJXGxN6EfOoNPOgdhdNqY7M0nC2aR8fBSYejrw';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SUBJECTS = [
  { key:'maths',          label:'Quantitative Aptitude', icon:'🔢', cls:'maths' },
  { key:'english',        label:'English',               icon:'📖', cls:'english' },
  { key:'reasoning',      label:'Reasoning',             icon:'🧠', cls:'reasoning' },
  { key:'ga',             label:'General Awareness',     icon:'🌍', cls:'ga' },
  { key:'current_affairs',label:'Current Affairs',       icon:'📰', cls:'ca' },
];
const EXAM_LABELS = { ssc_cgl:'SSC CGL', ssc_chsl:'SSC CHSL', ssc_mts:'SSC MTS', ssc_gd:'SSC GD', ntpc:'NTPC' };

let currentExam = 'ssc_cgl', currentSubject = null, currentUser = null;
let questions = [], currentQ = 0, answers = {}, timerInterval = null;
let timeLeft = 0, posMarking = 1, negMarking = 0, activeTestName = '';

// ============ INIT ============
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;
  document.getElementById('userNameNav').textContent =
    session.user.user_metadata?.full_name || session.user.email.split('@')[0];
  renderSubjects();
  updateBreadcrumb();
}

// ============ EXAM TAB ============
function switchExam(exam, btn) {
  currentExam = exam; currentSubject = null;
  document.querySelectorAll('.exam-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showView('subjects');
  updateBreadcrumb();
  renderSubjects();
}

// ============ SUBJECTS ============
function renderSubjects() {
  const grid = document.getElementById('subjectGrid');
  grid.innerHTML = SUBJECTS.map(s => `
    <div class="subject-card ${s.cls}" onclick="openSubject('${s.key}','${s.label}','${s.icon}')">
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-name">${s.label}</div>
      <div class="sc-count" id="cnt-${s.key}">Loading...</div>
      <button class="btn-open-subj">View Tests →</button>
    </div>`).join('');
  loadCounts();
}

async function loadCounts() {
  for (const s of SUBJECTS) {
    const { count } = await sb.from('quizzes')
      .select('*', { count:'exact', head:true })
      .eq('exam_type', currentExam).eq('subject', s.key);
    const el = document.getElementById('cnt-' + s.key);
    if (el) el.textContent = count > 0 ? `${count} Questions` : 'Coming soon!';
  }
}

// ============ OPEN SUBJECT → TESTS ============
async function openSubject(key, label, icon) {
  currentSubject = { key, label, icon };
  showView('tests');
  updateBreadcrumb();
  document.getElementById('testsTitle').innerHTML = `${icon} ${label} — <span>Tests</span>`;
  document.getElementById('testList').innerHTML = '<div class="loading-box"><span class="spinner"></span>Loading tests...</div>';

  const { data, error } = await sb.from('quizzes')
    .select('test_name, positive_marking, negative_marking, test_duration, difficulty')
    .eq('exam_type', currentExam).eq('subject', key)
    .not('test_name', 'is', null)
    .order('created_at', { ascending: true });

  if (error || !data || data.length === 0) {
    document.getElementById('testList').innerHTML =
      `<div class="empty-box"><div>📭</div><p>Is subject mein abhi koi test nahi hai.<br>Admin jald hi add karega!</p></div>`;
    return;
  }

  // Group by test_name
  const testMap = {};
  data.forEach(row => {
    if (!row.test_name) return;
    if (!testMap[row.test_name]) testMap[row.test_name] = { count:0, pos:row.positive_marking, neg:row.negative_marking, dur:row.test_duration, diff:row.difficulty };
    testMap[row.test_name].count++;
  });

  const tests = Object.entries(testMap);
  document.getElementById('testList').innerHTML = '<div class="test-list">' +
    tests.map(([name, info], i) => `
      <div class="test-card" onclick="startQuiz('${esc(name)}')">
        <div class="test-card-left">
          <div class="test-serial">Test ${i+1}</div>
          <div class="test-name">${esc(name)}</div>
          <div class="test-tags">
            <span class="ttag">${info.count} Questions</span>
            ${info.dur ? `<span class="ttag blue">⏱ ${info.dur} min</span>` : ''}
            ${info.pos ? `<span class="ttag green">+${info.pos}</span>` : ''}
            ${info.neg ? `<span class="ttag red">-${info.neg}</span>` : ''}
          </div>
        </div>
        <button class="btn-start-test">Start →</button>
      </div>`).join('') + '</div>';
}

// ============ BREADCRUMB / VIEW ============
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

function updateBreadcrumb() {
  const examLabel = EXAM_LABELS[currentExam] || currentExam;
  let html = '';
  if (currentSubject) {
    html = `<span class="bc-btn" onclick="goBackToSubjects()">← ${examLabel}</span>
            <span class="bc-sep">›</span>
            <span class="bc-current">${currentSubject.icon} ${currentSubject.label}</span>`;
  } else {
    html = `<span class="bc-current">📝 ${examLabel}</span>`;
  }
  document.getElementById('breadcrumb').innerHTML = html;
}

function goBackToSubjects() {
  currentSubject = null;
  showView('subjects');
  updateBreadcrumb();
}

// ============ START QUIZ ============
async function startQuiz(testName) {
  if (!currentSubject) return;
  activeTestName = testName;

  const { data, error } = await sb.from('quizzes')
    .select('*')
    .eq('exam_type', currentExam)
    .eq('subject', currentSubject.key)
    .eq('test_name', testName)
    .order('created_at', { ascending: true });

  if (error || !data || data.length === 0) { alert('⚠️ Questions load nahi hue!'); return; }

  questions = data; currentQ = 0; answers = {};
  posMarking = questions[0].positive_marking || 1;
  negMarking = questions[0].negative_marking || 0;
  timeLeft = (questions[0].test_duration || 30) * 60;

  document.getElementById('quizTitle').innerHTML = `${EXAM_LABELS[currentExam]} — <span>${testName}</span>`;
  document.getElementById('mPos').textContent = '+' + posMarking;
  document.getElementById('mNeg').textContent = '-' + negMarking;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display = 'block';
  document.getElementById('quizFooter').style.display = 'flex';
  document.getElementById('qNavDots').style.display = 'flex';
  renderQNavDots(); showQuestion(0); startTimer();
  document.getElementById('quizOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// ============ QUESTION ============
function showQuestion(idx) {
  currentQ = idx;
  const q = questions[idx], total = questions.length;
  document.getElementById('qNumber').textContent = `Question ${idx+1} of ${total}`;
  document.getElementById('qText').textContent = q.question_text;
  document.getElementById('quizProgressText').textContent = `${idx+1}/${total}`;
  document.getElementById('quizProgressFill').style.width = ((idx+1)/total*100) + '%';
  const selected = answers[idx], answered = selected !== undefined;
  document.getElementById('optionsList').innerHTML = [
    {k:'A',v:q.option_a},{k:'B',v:q.option_b},{k:'C',v:q.option_c},{k:'D',v:q.option_d}
  ].map(o => {
    let cls = 'option-btn';
    if (answered) { if (o.k === q.correct_answer) cls += ' correct'; else if (o.k === selected) cls += ' wrong'; }
    else if (o.k === selected) cls += ' selected';
    return `<button class="${cls}" onclick="selectOption('${o.k}')" ${answered?'disabled':''}>
      <span class="option-label">${o.k}</span><span>${o.v||''}</span></button>`;
  }).join('');
  const expBox = document.getElementById('explanationBox');
  if (answered && q.explanation) { document.getElementById('explanationText').textContent = q.explanation; expBox.classList.add('show'); }
  else expBox.classList.remove('show');
  document.getElementById('btnPrev').style.display   = idx===0 ? 'none':'inline-block';
  document.getElementById('btnNext').style.display   = idx===total-1 ? 'none':'inline-block';
  document.getElementById('btnSubmit').style.display = idx===total-1 ? 'inline-block':'none';
  renderQNavDots();
}

function selectOption(opt) { if (answers[currentQ]!==undefined) return; answers[currentQ]=opt; showQuestion(currentQ); }
function prevQ() { if (currentQ>0) showQuestion(currentQ-1); }
function nextQ() { if (currentQ<questions.length-1) showQuestion(currentQ+1); }
function renderQNavDots() {
  document.getElementById('qNavDots').innerHTML = questions.map((q,i) => {
    let cls = 'q-dot' + (answers[i]!==undefined?' answered':'') + (i===currentQ?' current':'');
    return `<div class="${cls}" onclick="showQuestion(${i})">${i+1}</div>`;
  }).join('');
}

// ============ TIMER ============
function startTimer() {
  clearInterval(timerInterval); updateTimerDisplay();
  timerInterval = setInterval(() => { timeLeft--; updateTimerDisplay(); if(timeLeft<=0){clearInterval(timerInterval);submitQuiz();} }, 1000);
}
function updateTimerDisplay() {
  const m=Math.floor(timeLeft/60).toString().padStart(2,'0'), s=(timeLeft%60).toString().padStart(2,'0');
  const el=document.getElementById('quizTimer');
  el.textContent=m+':'+s; el.style.color=timeLeft<60?'#ff4444':'#e63946';
}

// ============ SUBMIT ============
async function submitQuiz() {
  clearInterval(timerInterval);
  let correct=0,wrong=0,skip=0,score=0;
  questions.forEach((q,i)=>{const a=answers[i];if(!a)skip++;else if(a===q.correct_answer){correct++;score+=posMarking;}else{wrong++;score-=negMarking;}});
  const totalMarks = questions[0].total_marks || (questions.length*posMarking);
  score = Math.max(0,score);
  const pct = Math.round((score/totalMarks)*100);
  document.getElementById('quizBody').style.display='none';
  document.getElementById('quizFooter').style.display='none';
  document.getElementById('qNavDots').style.display='none';
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('resultIcon').textContent  = pct>=70?'🎉':pct>=40?'😊':'😔';
  document.getElementById('resultTitle').textContent = pct>=70?'Bahut Badhiya!':pct>=40?'Achha Kiya!':'Aur Practice Karo!';
  document.getElementById('resultScore').textContent = score.toFixed(1);
  document.getElementById('resultSub').textContent   = `out of ${totalMarks} marks (${pct}%)`;
  document.getElementById('rCorrect').textContent=correct;
  document.getElementById('rWrong').textContent=wrong;
  document.getElementById('rSkip').textContent=skip;
  try {
    await sb.from('test_attempts').insert({ user_id:currentUser.id, test_name:activeTestName, score:parseFloat(score.toFixed(1)), total_marks:totalMarks, correct_answers:correct, wrong_answers:wrong, questions_attempted:questions.length-skip });
  } catch(e){}
}

function retryQuiz() {
  answers={}; currentQ=0; timeLeft=(questions[0].test_duration||30)*60;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='block';
  document.getElementById('quizFooter').style.display='flex';
  document.getElementById('qNavDots').style.display='flex';
  renderQNavDots(); showQuestion(0); startTimer();
}

function exitQuiz() {
  clearInterval(timerInterval);
  document.getElementById('quizOverlay').classList.remove('show');
  document.body.style.overflow='';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizBody').style.display='block';
  document.getElementById('quizFooter').style.display='flex';
  document.getElementById('qNavDots').style.display='flex';
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

init();
</script>
