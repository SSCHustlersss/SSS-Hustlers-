<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | SSC Hustlers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#f5f6fa; --bg2:#fff; --bg3:#f9f9f9;
  --text:#1a1a2e; --text2:#888; --border:#e8e8e8;
  --card-bg:#fff; --tab-bg:#fff; --tab-hover:#f9f9f9;
  --perf-bar:#f0f0f0; --test-item:#f9f9f9; --saved-item:#f9f9f9;
  --folder-item:#f9f9f9; --lb-item:#f9f9f9;
  --red:#e63946; --green:#00c853;
}
[data-theme="dark"] {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a;
  --text:#e8eaf6; --text2:#6b7280; --border:#2d334a;
  --card-bg:#1a1d27; --tab-bg:#1a1d27; --tab-hover:#22263a;
  --perf-bar:#2d334a; --test-item:#22263a; --saved-item:#22263a;
  --folder-item:#22263a; --lb-item:#22263a;
}
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); padding-bottom: 80px; transition: 0.3s; }

/* Dashboard Styles */
.header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2em; }
.greeting h2 { font-size: 1.1em; font-weight: 700; }
.greeting p { font-size: 0.8em; color: var(--text2); }

.tab-content { display: none; padding: 0 20px; }
.tab-content.active { display: block; }

/* FOLDER HIERARCHY STYLES */
.folder-item { background: var(--folder-item); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; font-weight: 600; border: 1px solid var(--border); transition: 0.2s; }
.folder-item:hover { transform: translateY(-2px); border-color: var(--red); }
.sub-folder-container { display: none; padding-left: 15px; margin-bottom: 15px; }
.test-item { background: var(--bg2); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }
.test-item:hover { background: var(--bg3); border-color: var(--red); }

/* Baki ka original CSS (Stats, Leaderboard etc.) */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
.stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
.stat-val { font-size: 1.5em; font-weight: 800; color: var(--red); display: block; }
.stat-label { font-size: 0.75em; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

.nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--bg2); display: flex; justify-content: space-around; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); z-index: 1000; }
.nav-item { color: var(--text2); font-size: 1.2em; cursor: pointer; transition: 0.3s; padding: 5px 15px; border-radius: 12px; }
.nav-item.active { color: var(--red); background: rgba(230,57,70,0.1); }
</style>
</head>
<body>

<div class="header">
  <div class="user-info">
    <div class="avatar" id="user-avatar">U</div>
    <div class="greeting">
      <p>Welcome back,</p>
      <h2 id="user-name">Loading...</h2>
    </div>
  </div>
  <button id="theme-toggle" style="background:none; border:none; font-size:1.5em; cursor:pointer;">🌓</button>
</div>

<div id="content-home" class="tab-content active">
  <div class="stats-grid">
    <div class="stat-card"><span class="stat-val" id="stat-tests">0</span><span class="stat-label">Tests</span></div>
    <div class="stat-card"><span class="stat-val" id="stat-score">0</span><span class="stat-label">Points</span></div>
  </div>
  <h3 style="margin-bottom:15px;">Recent Performance</h3>
  <div id="recent-activity"></div>
</div>

<div id="content-quizzes" class="tab-content">
  <h3 style="margin-bottom:20px;">Exam Categories</h3>
  
  <div class="folder-item" onclick="toggleFolder('ntpc-tree')">
    <span id="ntpc-tree-icon">📁</span> &nbsp; RRB NTPC
  </div>
  <div id="ntpc-tree" class="sub-folder-container">
    
    <div class="folder-item" onclick="toggleFolder('ca-tree')">
      <span id="ca-tree-icon">📁</span> &nbsp; Current Affairs (2025-26)
    </div>
    <div id="ca-tree" class="sub-folder-container">
      <div class="test-item" onclick="window.location.href='quizzes.html?cat=CA_Weekly'">🔥 Weekly Special Mock <span>➔</span></div>
      <div class="test-item" onclick="window.location.href='quizzes.html?cat=CA_Sports'">🏆 Sports & Awards <span>➔</span></div>
    </div>

    <div class="test-item" onclick="window.location.href='quizzes.html?cat=Maths'">🔢 Mathematics <span>➔</span></div>
    <div class="test-item" onclick="window.location.href='quizzes.html?cat=Reasoning'">🧠 Reasoning <span>➔</span></div>
  </div>

  </div>

<div id="content-leaderboard" class="tab-content">
  <h3 style="margin-bottom:20px;">Top Hustlers</h3>
  <div id="leaderboard-list"></div>
</div>

<nav class="nav-bar">
  <div class="nav-item active" onclick="showTab('home')" id="tab-home">🏠</div>
  <div class="nav-item" onclick="showTab('quizzes')" id="tab-quizzes">📝</div>
  <div class="nav-item" onclick="showTab('leaderboard')" id="tab-leaderboard">🏆</div>
</nav>

<script>
// Tab Switching
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('content-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// Nested Folder Toggle
function toggleFolder(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  if (el.style.display === 'none' || el.style.display === '') {
    el.style.display = 'block';
    if(icon) icon.innerText = '📂';
  } else {
    el.style.display = 'none';
    if(icon) icon.innerText = '📁';
  }
}

// Theme Toggle
document.getElementById('theme-toggle').onclick = () => {
  const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
};

// Yahan aapka purana Supabase Init aur Auth logic paste kar lena niche
</script>
</body>
</html>
