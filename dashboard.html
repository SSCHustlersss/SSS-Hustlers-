<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | SSC Hustlers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#f5f6fa; --bg2:#fff; --bg3:#f9f9f9;
  --text:#1a1a2e; --text2:#888; --border:#e8e8e8;
  --card-bg:#fff; --tab-bg:#fff; --tab-hover:#f9f9f9;
  --perf-bar:#f0f0f0; --test-item:#f9f9f9; --saved-item:#f9f9f9;
  --folder-item:#f9f9f9; --lb-item:#f9f9f9;
  --red:#e63946; --green:#00c853;
}
[data-theme="dark"] {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a;
  --text:#e8eaf6; --text2:#6b7280; --border:#2e3250;
  --card-bg:#1a1d27; --tab-bg:#1a1d27; --tab-hover:#22263a;
  --perf-bar:#2e3250; --test-item:#22263a; --saved-item:#22263a;
  --folder-item:#22263a; --lb-item:#22263a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; transition:background 0.3s,color 0.3s; }

/* SIDEBAR & MAIN LAYOUT */
.sidebar { width:240px; background:#1a1a2e; min-height:100vh; position:fixed; left:0; top:0; z-index:50; display:flex; flex-direction:column; }
.main { margin-left:240px; flex:1; padding:28px; }
.sidebar-logo { padding:24px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-logo h2 { font-size:1.2rem; font-weight:800; color:var(--red); }
.nav-item { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; cursor:pointer; color:rgba(255,255,255,0.6); font-size:0.88rem; text-decoration:none; margin-bottom:4px; }
.nav-item.active { background:rgba(230,57,70,0.15); color:var(--red); }

/* FOLDER GRID & ITEMS */
.folder-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
.folder-item { background:var(--folder-item); border:2px solid var(--border); border-radius:14px; padding:20px; text-align:center; cursor:pointer; transition:0.2s; position:relative; }
.folder-item:hover { border-color:var(--red); transform:translateY(-2px); }
.folder-icon { font-size:2rem; margin-bottom:8px; }
.folder-name { font-size:0.88rem; font-weight:700; color:var(--text); }
.sub-folder-container { display:none; grid-column: 1 / -1; background:var(--bg3); padding:15px; border-radius:14px; border:1px dashed var(--border); margin-bottom:15px; }

/* TEST ITEMS */
.test-item { display:flex; align-items:center; justify-content:space-between; background:var(--bg2); border-radius:10px; padding:12px 16px; border:1px solid var(--border); margin-bottom:8px; cursor:pointer; }
.test-item:hover { border-color:var(--red); }
.test-name { font-size:0.85rem; font-weight:600; }

/* BAKI KI STYLING (Stats, Leaderboard etc. remain same as your original) */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--card-bg); border-radius:14px; padding:22px 20px; border:1px solid var(--border); }
.tabs-header { display:flex; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab-btn { flex:1; padding:14px; cursor:pointer; background:none; border:none; color:var(--text2); font-weight:600; }
.tab-btn.active { color:var(--red); border-bottom:2px solid var(--red); }
.tab-content { display:none; }
.tab-content.active { display:block; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo"><h2>SSC <span>HUSTLERS</span></h2></div>
  <nav class="sidebar-nav" style="padding:16px 12px;">
    <a class="nav-item active" onclick="showTab('overview')">🏠 Dashboard</a>
    <a class="nav-item" href="quizzes.html">📝 Quizzes</a>
    <a class="nav-item" onclick="showTab('folders')">📁 Study Material</a>
    <a class="nav-item" onclick="showTab('leaderboard')">🏆 Leaderboard</a>
  </nav>
</div>

<div class="main">
  <div class="topbar" style="display:flex; justify-content:space-between; margin-bottom:24px;">
    <h1>Welcome, <span id="greetName">Student</span>!</h1>
    <button onclick="toggleDark()" class="btn-dark-toggle">🌙</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div>📊</div><div class="stat-val" id="totalTests">0</div><div class="stat-label">Tests Done</div></div>
    <div class="stat-card"><div>🎯</div><div class="stat-val" id="avgScore">0%</div><div class="stat-label">Performance</div></div>
    <div class="stat-card"><div>🏆</div><div class="stat-val" id="myRank">#-</div><div class="stat-label">Rank</div></div>
  </div>

  <div class="tabs-container">
    <div class="tabs-header">
      <button class="tab-btn active" id="tab-overview" onclick="showTab('overview')">📈 Overview</button>
      <button class="tab-btn" id="tab-folders" onclick="showTab('folders')">📁 Material</button>
      <button class="tab-btn" id="tab-leaderboard" onclick="showTab('leaderboard')">🏆 Leaderboard</button>
    </div>

    <div class="tab-content active" id="content-overview">
      <h3>Performance Tracking...</h3>
    </div>

    <div class="tab-content" id="content-folders">
      <div class="folder-grid">
        
        <div class="folder-item" onclick="toggleFolder('ntpc-tree')" style="border-color:var(--red);">
          <div class="folder-icon" id="ntpc-tree-icon">📁</div>
          <div class="folder-name">RRB NTPC 2026</div>
          <div class="folder-count">Full Exam Access</div>
        </div>

        <div id="ntpc-tree" class="sub-folder-container">
          <div class="folder-item" onclick="toggleFolder('ca-tree')" style="background:var(--bg2); margin-bottom:10px;">
            <div class="folder-icon" id="ca-tree-icon">📁</div>
            <div class="folder-name">Current Affairs</div>
          </div>
          <div id="ca-tree" style="display:none; padding-left:20px; margin-bottom:15px;">
            <div class="test-item" onclick="window.location.href='quizzes.html?cat=CA_Weekly'">🔥 Weekly Special Mock</div>
            <div class="test-item" onclick="window.location.href='quizzes.html?cat=CA_Sports'">🏆 Sports & Awards</div>
          </div>
          <div class="test-item" onclick="window.location.href='quizzes.html?cat=Maths'">🔢 Mathematics</div>
          <div class="test-item" onclick="window.location.href='quizzes.html?cat=Reasoning'">🧠 Reasoning</div>
        </div>

        <div class="folder-item" onclick="alert('Coming Soon')">
          <div class="folder-icon">🗂️</div><div class="folder-name">PYQ Bank</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="content-leaderboard">
      <div id="lbList"></div>
    </div>
  </div>
</div>

<script>
// Toggle Folders
function toggleFolder(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  if (el.style.display === 'none' || el.style.display === '') {
    el.style.display = 'block';
    if(icon) icon.innerText = '📂';
  } else {
    el.style.display = 'none';
    if(icon) icon.innerText = '📁';
  }
}

// Tab Switching
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.getElementById('content-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// Dark Mode
function toggleDark() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

</script>
