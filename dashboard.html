<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | SSC Hustlers</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Aapka existing CSS yahan rahega */
    :root {
      --bg:#f5f6fa; --bg2:#fff; --bg3:#f9f9f9;
      --text:#1a1a2e; --text2:#888; --border:#e8e8e8;
      --card-bg:#fff; --tab-bg:#fff; --tab-hover:#f9f9f9;
      --perf-bar:#f0f0f0; --test-item:#f9f9f9; --saved-item:#f9f9f9;
      --folder-item:#f9f9f9; --lb-item:#f9f9f9;
      --red:#e63946; --green:#00c853;
    }
    .folder-item { background: var(--folder-item); padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; font-weight: 500; }
    .sub-folder { display: none; padding-left: 20px; border-left: 2px solid var(--border); margin-left: 10px; }
    .test-item { background: var(--test-item); padding: 10px; border-radius: 6px; margin-bottom: 5px; cursor: pointer; font-size: 0.9em; }
  </style>
</head>
<body>

  <div id="content-folders" class="tab-content active">
    
    <div class="folder-item" onclick="toggleFolder('quizzes-root')">
      <span>📂</span> Quizzes
    </div>
    
    <div id="quizzes-root" class="sub-folder" style="display:block;">
      
      <div class="folder-item" onclick="toggleFolder('ntpc-folder')">
        <span id="ntpc-icon">📁</span> NTPC
      </div>
      
      <div id="ntpc-folder" class="sub-folder">
        
        <div class="folder-item" onclick="toggleFolder('ca-folder')">
          <span id="ca-icon">📁</span> Current Affairs
        </div>
        
        <div id="ca-folder" class="sub-folder">
          <div class="test-item" onclick="loadTests('Current Affairs')">🔥 Weekly Current Affairs</div>
          <div class="test-item" onclick="loadTests('Sports')">🏆 Sports Special</div>
        </div>

        <div class="test-item" onclick="loadTests('Maths')">Maths</div>
        <div class="test-item" onclick="loadTests('Reasoning')">Reasoning</div>
      </div>
      
    </div>
  </div>

  <script>
    // Folder Toggle Logic
    function toggleFolder(id) {
      const el = document.getElementById(id);
      const icon = document.getElementById(id.split('-')[0] + '-icon');
      if (el.style.display === 'none' || el.style.display === '') {
        el.style.display = 'block';
        if(icon) icon.innerText = '📂';
      } else {
        el.style.display = 'none';
        if(icon) icon.innerText = '📁';
      }
    }

    // Aapka existing Supabase loadTests function yahan aayega
    function loadTests(category) {
      console.log("Loading tests for: " + category);
      // Supabase fetch logic...
    }
  </script>
</body>
</html>
