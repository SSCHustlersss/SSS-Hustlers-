* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* LOCK SCREEN */
.lock-screen {

.loading { text-align:center; padding:40px; color:var(--text-muted); }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.6s linear infinite; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:48px; color:var(--text-muted); }
.empty-state .empty-icon { font-size:2.5rem; margin-bottom:12px; }

/* PAGINATION */
.pagination { display:flex; gap:6px; align-items:center; justify-content:center; margin-top:20px; flex-wrap:wrap; }
.page-btn { padding:7px 13px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); color:var(--text-muted); font-size:0.82rem; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }

/* USER DETAIL MODAL */

.modal-overlay.show { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; animation: fadeUp 0.3s ease; }
.modal-title { font-size:1.05rem; font-weight:700; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:var(--bg3); border:1px solid var(--border); color:var(--text-muted); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; }

.detail-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); }

</style>

  }

  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';
  document.getElementById('adminEmailDisplay').textContent = data.user.email;
  loadUsers();
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.reload();
}

// ============ LOAD USERS ============
async function loadUsers() {
  const listEl = document.getElementById('usersList');
  listEl.innerHTML = '<div class="loading"><span class="spinner"></span>Loading users...</div>';

  // Try to fetch from profiles table
  const { data, error } = await sb
    .from('profiles')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error loading users:<br>${error.message}<br><br>Make sure your <strong>profiles</strong> table exists in Supabase.</p></div>`;
    return;
  }

  allUsers = (data || []).map(u => ({
    ...u,
    _abusive: isAbusive(u.full_name) || isAbusive(u.username)
  }));

  const abusiveCount = allUsers.filter(u => u._abusive).length;
  const bannedCount  = allUsers.filter(u => u.is_banned).length;
  const activeCount  = allUsers.filter(u => !u.is_banned).length;

  document.getElementById('statTotal').textContent   = allUsers.length;
  document.getElementById('statAbusive').textContent = abusiveCount;
  document.getElementById('statBanned').textContent  = bannedCount;
  document.getElementById('statActive').textContent  = activeCount;

  // Abusive warning banner
  if (abusiveCount > 0) {
    const names = allUsers.filter(u => u._abusive && !u.is_banned)
      .map(u => u.full_name || u.username || 'Unknown')
      .slice(0, 8).join(', ');
    document.getElementById('abusiveBannerSub').textContent =
      `${abusiveCount} user(s) with abusive username found: ${names}${abusiveCount > 8 ? '...' : ''}`;
    document.getElementById('abusiveBanner').classList.add('show');
  } else {
    document.getElementById('abusiveBanner').classList.remove('show');
  }

  filteredUsers = [...allUsers];
  currentPage = 1;
  selectedIds.clear();
  renderUsers();
}

// ============ FILTER ============
function filterUsers() {
  const search = document.getElementById('searchInp').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;

  filteredUsers = allUsers.filter(u => {
    const matchSearch = !search ||
      (u.full_name || '').toLowerCase().includes(search) ||
      (u.username || '').toLowerCase().includes(search) ||
      (u.email || '').toLowerCase().includes(search);

    const matchStatus =
      !status ? true :
      status === 'abusive' ? u._abusive :
      status === 'banned'  ? u.is_banned :
      status === 'active'  ? !u.is_banned : true;

    return matchSearch && matchStatus;
  });

  currentPage = 1;
  renderUsers();
}

// ============ RENDER ============
function renderUsers() {
  const listEl = document.getElementById('usersList');
  document.getElementById('userCountBadge').textContent = `${filteredUsers.length} Users`;
  document.getElementById('bulkBar').classList.toggle('show', filteredUsers.length > 0);
  updateSelectedCount();

  if (filteredUsers.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Koi user nahi mila.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(filteredUsers.length / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredUsers.slice(start, start + PAGE_SIZE);

  listEl.innerHTML = pageData.map(u => {
    const name = u.full_name || u.username || 'Unknown User';
    const initials = name.slice(0, 2).toUpperCase();
    const joinedDate = u.created_at
      ? new Date(u.created_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })
      : '—';
    const isNew = u.created_at && (Date.now() - new Date(u.created_at)) < 7 * 24 * 60 * 60 * 1000;

    const cardClass = u.is_banned ? 'user-card banned' : u._abusive ? 'user-card abusive' : 'user-card';

    return `<div class="${cardClass}" id="ucard-${u.id}">
      <input type="checkbox" onchange="toggleSelect('${u.id}', this)"
        ${selectedIds.has(u.id) ? 'checked' : ''}
        style="width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:var(--red);">

      <div class="user-avatar">${initials}</div>

      <div class="user-info">
        <div class="user-name">
          ${escHtml(name)}
          ${u.is_banned ? '<span class="badge-banned">🚫 BANNED</span>' : ''}
          ${u._abusive && !u.is_banned ? '<span class="badge-abusive">⚠️ ABUSIVE</span>' : ''}
          ${u.email === ADMIN_EMAIL ? '<span class="badge-admin">👑 ADMIN</span>' : ''}
          ${isNew ? '<span class="badge-new">NEW</span>' : ''}
        </div>
        <div class="user-email">${escHtml(u.email || u.id || '—')}</div>
        <div class="user-meta">
          <span class="badge-joined">📅 ${joinedDate}</span>
          ${u.username ? `<span style="background:rgba(66,133,244,0.1);color:#4285f4;border:1px solid rgba(66,133,244,0.2);padding:2px 8px;border-radius:50px;font-size:0.65rem;font-weight:600;">@${escHtml(u.username)}</span>` : ''}
        </div>
      </div>

      <div class="user-actions" style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;">
        <button class="btn-view" onclick="viewUser('${u.id}')">👁️ View</button>
        ${u.email !== ADMIN_EMAIL ? (
          u.is_banned
            ? `<button class="btn-unban" onclick="toggleBan('${u.id}', false)">✅ Unban</button>`
            : `<button class="btn-ban" onclick="toggleBan('${u.id}', true)">🚫 Ban</button>`
        ) : ''}
      </div>
    </div>`;
  }).join('');

  renderPagination(totalPages);
}

// ============ BAN / UNBAN ============
async function toggleBan(userId, ban) {
  const user = allUsers.find(u => u.id === userId);
  const name = user ? (user.full_name || user.username || 'this user') : 'this user';

  const msg = ban
    ? `🚫 Ban "${name}"?\n\nThey will not be able to log in.`
    : `✅ Unban "${name}"?\n\nThey will regain access.`;

  if (!confirm(msg)) return;

  const { error } = await sb.from('profiles').update({ is_banned: ban }).eq('id', userId);

  if (error) {
    // If is_banned column doesn't exist, try alternative
    if (error.message.includes('column') || error.code === '42703') {
      alert('⚠️ "is_banned" column profiles table mein nahi hai!\n\nSupabase mein add karo:\nALTER TABLE profiles ADD COLUMN is_banned boolean DEFAULT false;');
    } else {
      alert('Error: ' + error.message);
    }
    return;
  }

  // Update local
  const u = allUsers.find(x => x.id === userId);
  if (u) u.is_banned = ban;

  // Update stats
  const bannedCount = allUsers.filter(u => u.is_banned).length;
  document.getElementById('statBanned').textContent = bannedCount;
  document.getElementById('statActive').textContent = allUsers.length - bannedCount;

  filterUsers();
}

async function banAllAbusive() {
  const abusiveActive = allUsers.filter(u => u._abusive && !u.is_banned && u.email !== ADMIN_EMAIL);
  if (abusiveActive.length === 0) { alert('✅ Koi abusive user nahi hai jo active ho!'); return; }

  const names = abusiveActive.map(u => u.full_name || u.username || 'Unknown').join('\n');
  if (!confirm(`🚫 ${abusiveActive.length} users ko ban karna hai?\n\n${names}`)) return;

  let success = 0;
  for (const u of abusiveActive) {
    const { error } = await sb.from('profiles').update({ is_banned: true }).eq('id', u.id);
    if (!error) { u.is_banned = true; success++; }
  }

  // Update stats
  const bannedCount = allUsers.filter(u => u.is_banned).length;
  document.getElementById('statBanned').textContent = bannedCount;
  document.getElementById('statActive').textContent = allUsers.length - bannedCount;

  alert(`✅ ${success}/${abusiveActive.length} abusive users ban ho gaye!`);
  filterUsers();
}

// ============ BULK BAN / UNBAN ============
async function bulkBan() {
  if (selectedIds.size === 0) { alert('Pehle users select karo!'); return; }
  const ids = [...selectedIds].filter(id => {
    const u = allUsers.find(x => x.id === id);
    return u && u.email !== ADMIN_EMAIL;
  });
  if (!confirm(`🚫 ${ids.length} users ko ban karna hai?`)) return;

  let success = 0;
  for (const id of ids) {
    const { error } = await sb.from('profiles').update({ is_banned: true }).eq('id', id);
    if (!error) {
      const u = allUsers.find(x => x.id === id);
      if (u) u.is_banned = true;
      success++;
    }
  }

  const bannedCount = allUsers.filter(u => u.is_banned).length;
  document.getElementById('statBanned').textContent = bannedCount;
  document.getElementById('statActive').textContent = allUsers.length - bannedCount;

  selectedIds.clear();
  alert(`✅ ${success} users ban ho gaye!`);
  filterUsers();
}

async function bulkUnban() {
  if (selectedIds.size === 0) { alert('Pehle users select karo!'); return; }
  const ids = [...selectedIds];
  if (!confirm(`✅ ${ids.length} users ko unban karna hai?`)) return;

  let success = 0;
  for (const id of ids) {
    const { error } = await sb.from('profiles').update({ is_banned: false }).eq('id', id);
    if (!error) {
      const u = allUsers.find(x => x.id === id);
      if (u) u.is_banned = false;
      success++;
    }
  }

  const bannedCount = allUsers.filter(u => u.is_banned).length;
  document.getElementById('statBanned').textContent = bannedCount;
  document.getElementById('statActive').textContent = allUsers.length - bannedCount;

  selectedIds.clear();
  alert(`✅ ${success} users unban ho gaye!`);
  filterUsers();
}

// ============ SELECT ============
function toggleSelect(id, chk) {
  if (chk.checked) selectedIds.add(id);
  else selectedIds.delete(id);
  updateSelectedCount();
}

function toggleSelectAll(chk) {
  const pageIds = filteredUsers.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE).map(u => u.id);
  if (chk.checked) pageIds.forEach(id => selectedIds.add(id));
  else pageIds.forEach(id => selectedIds.delete(id));
  renderUsers();
}

function deselectAll() {
  selectedIds.clear();
  document.getElementById('selectAllChk').checked = false;
  renderUsers();
}

function updateSelectedCount() {
  document.getElementById('selectedCount').textContent = selectedIds.size;
}

// ============ VIEW USER ============
function viewUser(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;

  const name = u.full_name || u.username || 'Unknown';
  const joinedDate = u.created_at
    ? new Date(u.created_at).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '—';

  const abusiveWords = ABUSIVE_WORDS.filter(w =>
    (u.full_name || '').toLowerCase().includes(w) ||
    (u.username  || '').toLowerCase().includes(w)
  );

  let rows = [
    ['Full Name', u.full_name || '—'],
    ['Username', u.username ? '@' + u.username : '—'],
    ['Email', u.email || '—'],
    ['User ID', u.id || '—'],
    ['Joined', joinedDate],
    ['Status', u.is_banned ? '🚫 BANNED' : '✅ Active'],
    ['Abusive', u._abusive ? ('⚠️ Yes — matched: ' + abusiveWords.join(', ')) : '✅ No'],
  ];

  // Show any extra fields from profiles table
  const skip = ['id', 'full_name', 'username', 'email', 'created_at', 'is_banned', '_abusive'];
  Object.keys(u).forEach(key => {
    if (!skip.includes(key) && u[key] !== null && u[key] !== undefined) {
      rows.push([key.replace(/_/g,' '), String(u[key])]);
    }
  });

  document.getElementById('modalBody').innerHTML = `
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px;">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--red-glow);border:2px solid rgba(230,57,70,0.3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:var(--red);flex-shrink:0;">${name.slice(0,2).toUpperCase()}</div>
      <div>
        <div style="font-size:1rem;font-weight:700;color:var(--text);">${escHtml(name)}</div>
        <div style="font-size:0.78rem;color:var(--text-muted);">${escHtml(u.email || '—')}</div>
      </div>
    </div>
    ${rows.map(([k,v]) => `
      <div class="detail-row">
        <div class="detail-key">${k}</div>
        <div class="detail-val">${escHtml(String(v))}</div>
      </div>
    `).join('')}
    <div style="margin-top:20px;display:flex;gap:10px;">
      ${u.email !== ADMIN_EMAIL ? (
        u.is_banned
          ? `<button class="btn-unban" style="flex:1;padding:10px;" onclick="toggleBan('${u.id}', false);closeModal()">✅ Unban User</button>`
          : `<button class="btn-ban" style="flex:1;padding:10px;" onclick="toggleBan('${u.id}', true);closeModal()">🚫 Ban User</button>`
      ) : '<span style="font-size:0.8rem;color:var(--text-muted);">Admin account — cannot ban</span>'}
    </div>
  `;

  document.getElementById('userModal').classList.add('show');
}

function closeModal() {
  document.getElementById('userModal').classList.remove('show');
}

document.getElementById('userModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============ PAGINATION ============
function renderPagination(totalPages) {
  const pagEl = document.getElementById('pagination');
  if (totalPages <= 1) { pagEl.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i===1 || i===totalPages || Math.abs(i-currentPage)<=2) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i-currentPage)===3) {
      html += `<span style="color:var(--text-muted);padding:0 4px">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pagEl.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderUsers();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ UTILS ============
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
