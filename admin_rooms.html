<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Rooms Admin | SSC Hustlers</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --red: #e63946; --red-dark: #b5202c; --red-glow: rgba(230,57,70,0.15);
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28;
  --border: rgba(255,255,255,0.08); --text: #e8eaf0; --text-muted: #6b7280;
  --green: #00c853; --yellow: #ffb300; --blue: #4285f4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--red); border-radius:10px; }

/* LOCK SCREEN */
.lock-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:radial-gradient(ellipse at center, #1a0a0d 0%, var(--bg) 70%); }
.lock-box { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:48px 44px; width:90%; max-width:400px; text-align:center; box-shadow:0 0 80px rgba(230,57,70,0.08); animation:fadeUp 0.5s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.lock-icon { font-size:2.8rem; margin-bottom:20px; display:block; }
.lock-box h2 { font-family:'Rajdhani',sans-serif; font-size:1.8rem; font-weight:700; color:#fff; }
.lock-box p { font-size:0.82rem; color:var(--text-muted); margin-top:4px; margin-bottom:32px; }
.inp-wrap { margin-bottom:16px; text-align:left; }
.inp-wrap label { font-size:0.78rem; font-weight:600; color:var(--text-muted); display:block; margin-bottom:8px; text-transform:uppercase; }
.inp-wrap input { width:100%; padding:13px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; font-size:0.9rem; font-family:inherit; color:var(--text); outline:none; transition:all 0.2s; }
.inp-wrap input:focus { border-color:var(--red); box-shadow:0 0 0 3px var(--red-glow); }
.btn-enter { width:100%; background:var(--red); color:#fff; border:none; padding:14px; border-radius:10px; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; margin-top:8px; }
.btn-enter:hover { background:var(--red-dark); transform:translateY(-1px); }
.btn-enter:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
.error-msg { background:rgba(230,57,70,0.1); border:1px solid rgba(230,57,70,0.3); color:#ff6b6b; padding:10px 14px; border-radius:8px; font-size:0.82rem; margin-bottom:16px; display:none; }
.error-msg.show { display:block; }

/* NAV */
.admin-panel { display:none; }
nav { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 5%; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:700; color:var(--red); letter-spacing:1px; }
.logo span { color:var(--text); }
.btn-logout { background:transparent; color:var(--text-muted); border:1px solid var(--border); padding:7px 16px; border-radius:8px; font-size:0.8rem; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.btn-logout:hover { color:var(--red); border-color:rgba(230,57,70,0.4); }
.admin-badge { background:var(--red-glow); color:var(--red); padding:4px 12px; border-radius:50px; font-size:0.7rem; font-weight:700; border:1px solid rgba(230,57,70,0.3); }

/* LAYOUT */
.container { max-width:800px; margin:0 auto; padding:28px 16px 80px; }
.page-title { font-family:'Rajdhani',sans-serif; font-size:1.6rem; font-weight:700; margin-bottom:28px; }
.page-title span { color:var(--red); }

/* CARD */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:20px; }
.card-title { font-size:0.95rem; font-weight:700; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; }
.badge { background:var(--red-glow); color:var(--red); padding:2px 10px; border-radius:50px; font-size:0.7rem; border:1px solid rgba(230,57,70,0.3); }

/* FORM */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
@media(max-width:500px) { .form-row { grid-template-columns:1fr; } }
.form-field label { font-size:0.75rem; font-weight:600; color:var(--text-muted); display:block; margin-bottom:8px; text-transform:uppercase; }
.form-field input, .form-field select { width:100%; padding:11px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; font-size:0.88rem; font-family:inherit; color:var(--text); outline:none; transition:all 0.2s; }
.form-field input:focus, .form-field select:focus { border-color:var(--red); box-shadow:0 0 0 3px var(--red-glow); }
.form-field select option { background:var(--bg3); }
.btn-primary { background:var(--red); color:#fff; border:none; padding:12px 28px; border-radius:10px; font-size:0.92rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.btn-primary:hover:not(:disabled) { background:var(--red-dark); transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.success-msg { background:rgba(0,200,83,0.08); border:1px solid rgba(0,200,83,0.25); color:var(--green); padding:12px 16px; border-radius:8px; font-size:0.85rem; font-weight:600; margin-bottom:16px; display:none; }
.success-msg.show { display:block; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

/* ROOM CARDS */
.room-card { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; transition:border-color 0.2s; }
.room-card:hover { border-color:rgba(230,57,70,0.3); }
.room-card-left { flex:1; min-width:0; }
.room-exam-name { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:8px; }
.room-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:6px; }
.room-code-badge { background:rgba(230,57,70,0.1); color:var(--red); border:1px solid rgba(230,57,70,0.25); padding:3px 10px; border-radius:50px; font-size:0.72rem; font-weight:700; letter-spacing:1px; }
.room-status-badge { padding:3px 10px; border-radius:50px; font-size:0.72rem; font-weight:700; }
.room-status-badge.active { background:rgba(0,200,83,0.1); color:var(--green); border:1px solid rgba(0,200,83,0.25); }
.room-status-badge.inactive { background:rgba(107,114,128,0.15); color:var(--text-muted); border:1px solid var(--border); }
.room-meta-item { font-size:0.75rem; color:var(--text-muted); }
.room-countdown { font-size:0.72rem; font-weight:700; color:var(--yellow); }
.members-count { font-size:0.78rem; color:var(--text-muted); margin-top:4px; }
.members-count span { font-weight:700; color:var(--blue); }
.room-actions { display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }
.btn-toggle-room { padding:7px 14px; border-radius:8px; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; border:1px solid; }
.btn-toggle-room.activate { background:rgba(0,200,83,0.1); color:var(--green); border-color:rgba(0,200,83,0.25); }
.btn-toggle-room.deactivate { background:rgba(255,179,0,0.1); color:var(--yellow); border-color:rgba(255,179,0,0.25); }
.btn-delete-room { background:rgba(230,57,70,0.1); color:var(--red); border:1px solid rgba(230,57,70,0.25); padding:7px 12px; border-radius:8px; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:inherit; }

/* LOADING / EMPTY */
.loading { text-align:center; padding:40px; color:var(--text-muted); }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.6s linear infinite; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:48px; color:var(--text-muted); }
.empty-icon { font-size:2.5rem; margin-bottom:12px; }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <span class="lock-icon">🎯</span>
    <h2>EXAM ROOMS</h2>
    <p>SSC Hustlers Admin</p>
    <div class="error-msg" id="lockError"></div>
    <div class="inp-wrap">
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="admin@email.com" onkeydown="if(event.key==='Enter')checkAdmin()">
    </div>
    <div class="inp-wrap">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAdmin()">
    </div>
    <button class="btn-enter" id="loginBtn" onclick="checkAdmin()">🔓 Enter</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <nav>
    <div class="logo">SSC <span>HUSTLERS</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="admin-badge">🎯 ROOMS</span>
      <button class="btn-logout" onclick="adminLogout()">↩ Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">Exam <span>Rooms</span> 🎯</div>

    <!-- CREATE ROOM -->
    <div class="card">
      <div class="card-title">➕ Naya Room Banao <span class="badge">NEW</span></div>
      <div class="success-msg" id="roomSuccessMsg">✅ Room successfully create ho gaya!</div>

      <div class="form-row">
        <div class="form-field">
          <label>Exam Name *</label>
          <input type="text" id="roomExamName" placeholder="e.g. SSC CGL 2026">
        </div>
        <div class="form-field">
          <label>Exam Type *</label>
          <select id="roomExamType">
            <option value="ssc_cgl">SSC CGL</option>
            <option value="ssc_chsl">SSC CHSL</option>
            <option value="ssc_cpo">SSC CPO</option>
            <option value="ssc_mts">SSC MTS</option>
            <option value="ssc_gd">SSC GD</option>
            <option value="ssc_steno">SSC Steno</option>
            <option value="rrb_ntpc">RRB NTPC</option>
            <option value="rrb_group_d">RRB Group D</option>
            <option value="ibps_po">IBPS PO</option>
            <option value="ibps_clerk">IBPS Clerk</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Exam Date *</label>
          <input type="date" id="roomExamDate">
        </div>
        <div class="form-field">
          <label>Room Code *</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="roomCode" placeholder="e.g. CGL2026" style="text-transform:uppercase;font-weight:700;letter-spacing:1px;">
            <button onclick="generateRoomCode()" style="background:var(--bg3);color:var(--text-muted);border:1px solid var(--border);padding:0 14px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:0.82rem;font-weight:700;white-space:nowrap;">⚡ Auto</button>
          </div>
        </div>
      </div>

      <div class="form-field" style="margin-bottom:16px;">
        <label>Description (Optional)</label>
        <input type="text" id="roomDesc" placeholder="e.g. CGL 2026 ki poori preparation ek jagah">
      </div>

      <button class="btn-primary" onclick="createRoom()">🎯 Room Create Karo</button>
    </div>

    <!-- ROOMS LIST -->
    <div class="card">
      <div class="card-title">
        <span>📋 Sabhi Rooms</span>
        <button onclick="loadRooms()" style="background:var(--bg3);color:var(--text-muted);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;">🔄 Refresh</button>
      </div>
      <div id="roomsList">
        <div class="loading"><span class="spinner"></span> Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wwfhoyxqlversdkdqcgd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZmhveXhxbHZlcnNka2RxY2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDAwMTMsImV4cCI6MjA4ODQ3NjAxM30.qaQp8LJXGxN6EfOoNPOgdhdNqY7M0nC2aR8fBSYejrw';
const ADMIN_EMAIL = 'anshul200160@gmail.com';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkAdmin() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  const errEl = document.getElementById('lockError');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errEl.textContent = '⚠️ Email aur password daalo!'; errEl.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Logging in...'; errEl.classList.remove('show');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error || !data?.user || data.user.email !== ADMIN_EMAIL) {
    await sb.auth.signOut();
    errEl.textContent = '🚫 Access Denied!';
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = '🔓 Enter';
    return;
  }
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadRooms();
}

async function adminLogout() {
  await sb.auth.signOut();
  location.reload();
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== LOAD ROOMS =====
async function loadRooms() {
  const el = document.getElementById('roomsList');
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';

  const { data, error } = await sb.from('exam_rooms').select('*').order('created_at', { ascending: false });

  if (error) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Error: ' + error.message + '</p></div>';
    return;
  }
  if (!data || data.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><p>Abhi koi room nahi hai. Upar se create karo!</p></div>';
    return;
  }

  // Member counts
  const roomIds = data.map(r => r.id);
  let memberMap = {};
  try {
    const { data: members } = await sb.from('room_members').select('room_id').in('room_id', roomIds);
    if (members) members.forEach(m => { memberMap[m.room_id] = (memberMap[m.room_id] || 0) + 1; });
  } catch(e) {}

  el.innerHTML = data.map(room => {
    const examDate = room.exam_date ? new Date(room.exam_date) : null;
    const today = new Date();
    const daysLeft = examDate ? Math.ceil((examDate - today) / (1000*60*60*24)) : null;
    const countdownText = daysLeft !== null ? (daysLeft > 0 ? `⏳ ${daysLeft} din bache` : daysLeft === 0 ? '🔴 Aaj exam hai!' : '✅ Exam ho gaya') : '';
    const members = memberMap[room.id] || 0;
    const dateStr = examDate ? examDate.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : 'Date set nahi';

    return `<div class="room-card">
      <div class="room-card-left">
        <div class="room-exam-name">${escHtml(room.exam_name || '')}</div>
        <div class="room-meta">
          <span class="room-code-badge">${escHtml(room.room_code || '')}</span>
          <span class="room-status-badge ${room.is_active ? 'active' : 'inactive'}">${room.is_active ? '🟢 Active' : '⚫ Inactive'}</span>
          <span class="room-meta-item">📅 ${dateStr}</span>
          <span class="room-countdown">${countdownText}</span>
        </div>
        <div class="members-count">👥 <span>${members}</span> students joined</div>
      </div>
      <div class="room-actions">
        <button class="btn-toggle-room ${room.is_active ? 'deactivate' : 'activate'}" onclick="toggleRoom('${room.id}', ${room.is_active})">
          ${room.is_active ? '⏸ Deactivate' : '▶️ Activate'}
        </button>
        <button class="btn-delete-room" onclick="deleteRoom('${room.id}', '${escHtml(room.exam_name || '')}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ===== CREATE ROOM =====
async function createRoom() {
  const examName = document.getElementById('roomExamName').value.trim();
  const examType = document.getElementById('roomExamType').value;
  const examDate = document.getElementById('roomExamDate').value;
  const roomCode = document.getElementById('roomCode').value.trim().toUpperCase();
  const desc = document.getElementById('roomDesc').value.trim();

  if (!examName) { alert('Exam name daalo!'); return; }
  if (!examDate) { alert('Exam date daalo!'); return; }
  if (!roomCode) { alert('Room code daalo!'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Creating...';

  const { error } = await sb.from('exam_rooms').insert({
    exam_name: examName, exam_type: examType, exam_date: examDate,
    room_code: roomCode, description: desc || null, is_active: true
  });

  btn.disabled = false; btn.textContent = '🎯 Room Create Karo';

  if (error) {
    if (error.code === '23505') alert('⚠️ Ye room code already exist karta hai!');
    else alert('Error: ' + error.message);
    return;
  }

  const sm = document.getElementById('roomSuccessMsg');
  sm.classList.add('show'); setTimeout(() => sm.classList.remove('show'), 3000);
  document.getElementById('roomExamName').value = '';
  document.getElementById('roomCode').value = '';
  document.getElementById('roomExamDate').value = '';
  document.getElementById('roomDesc').value = '';
  loadRooms();
}

async function toggleRoom(id, currentStatus) {
  const { error } = await sb.from('exam_rooms').update({ is_active: !currentStatus }).eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  loadRooms();
}

async function deleteRoom(id, name) {
  if (!confirm(`"${name}" room delete karna hai? Saare members bhi remove ho jaayenge!`)) return;
  await sb.from('room_members').delete().eq('room_id', id);
  const { error } = await sb.from('exam_rooms').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  loadRooms();
}

function generateRoomCode() {
  const examName = document.getElementById('roomExamName').value.trim();
  const examDate = document.getElementById('roomExamDate').value;
  if (examName) {
    const words = examName.toUpperCase().split(' ').filter(w => w.length > 1);
    const year = examDate ? new Date(examDate).getFullYear() : new Date().getFullYear();
    document.getElementById('roomCode').value = words.slice(0,3).map(w => w.slice(0,3)).join('') + year;
  } else {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = '';
    for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
    document.getElementById('roomCode').value = code;
  }
}
</script>
</body>
</html>
