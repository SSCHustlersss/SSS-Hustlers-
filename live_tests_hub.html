<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Tests | SSC Hustlers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:#f0f9ff;color:#111827;min-height:100vh;}

/* HEADER */
.header{background:#fff;border-bottom:2px solid #0ea5e9;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(14,165,233,0.08);}
.back-btn{background:#f0f9ff;border:1.5px solid #bae6fd;color:#0284c7;padding:6px 14px;border-radius:8px;font-size:0.78rem;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all 0.15s;}
.back-btn:hover{background:#e0f2fe;}
.header-title{font-size:1rem;font-weight:800;color:#0ea5e9;flex:1;}
.header-title span{color:#111827;}
.user-chip{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:50px;padding:5px 12px;font-size:0.72rem;font-weight:700;color:#0284c7;white-space:nowrap;}

/* TABS */
.tabs-wrap{background:#fff;border-bottom:1.5px solid #e0f2fe;padding:0 20px;position:sticky;top:57px;z-index:90;}
.tabs{display:flex;gap:0;}
.tab-btn{padding:11px 16px;border:none;background:transparent;font-family:inherit;font-size:0.78rem;font-weight:700;color:#64748b;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all 0.15s;white-space:nowrap;}
.tab-btn.active{color:#0ea5e9;border-bottom-color:#0ea5e9;}

/* MAIN */
.main{max-width:520px;margin:0 auto;padding:16px;}
.section{display:none;}
.section.show{display:block;}

/* SECTION TITLE */
.sec-title{font-size:0.72rem;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.6px;margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
.sec-title:first-child{margin-top:0;}

/* TEST CARD */
.test-card{background:#fff;border:1.5px solid #e0f2fe;border-radius:16px;padding:16px;margin-bottom:10px;transition:all 0.15s;}
.test-card:hover{border-color:#0ea5e9;box-shadow:0 2px 12px rgba(14,165,233,0.1);}
.test-card.past{border-color:#e2e8f0;background:#fafafa;}
.test-card.live-card{border-color:#0ea5e9;background:linear-gradient(135deg,#f0f9ff 0%,#fff 100%);box-shadow:0 4px 20px rgba(14,165,233,0.12);}

.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.live-icon{background:#dcfce7;} .past-icon{background:#f1f5f9;} .upcoming-icon{background:#fef3c7;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:0.9rem;font-weight:700;color:#111827;margin-bottom:5px;line-height:1.3;}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.pill{font-size:0.65rem;font-weight:700;padding:2px 9px;border-radius:50px;}
.pill.blue{background:#e0f2fe;color:#0284c7;}
.pill.yellow{background:#fef3c7;color:#b45309;}
.pill.green{background:#dcfce7;color:#15803d;}
.pill.red{background:#fee2e2;color:#dc2626;}
.pill.grey{background:#f1f5f9;color:#64748b;}

/* STATUS LABELS */
.live-status{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:800;color:#15803d;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,0.4);}50%{box-shadow:0 0 0 4px rgba(22,163,74,0);}}
.upcoming-status{font-size:0.72rem;font-weight:700;color:#b45309;}
.ended-status{font-size:0.72rem;color:#94a3b8;font-weight:600;}

/* BUTTONS */
.attempt-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#0ea5e9;color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.attempt-btn:hover{background:#0284c7;}
.attempt-btn.disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed;}
.attempt-btn.already{background:#dcfce7;color:#15803d;border:1.5px solid #86efac;cursor:pointer;}
.attempt-btn.already:hover{background:#bbf7d0;}
.attempt-btn.secondary{background:#e0f2fe;color:#0284c7;border:1.5px solid #bae6fd;}
.attempt-btn.secondary:hover{background:#bae6fd;}

/* ALREADY ATTEMPTED BADGE */
.attempted-badge{display:flex;align-items:center;justify-content:space-between;background:#dcfce7;border:1.5px solid #86efac;border-radius:10px;padding:8px 12px;margin-bottom:8px;}
.attempted-badge-left{display:flex;align-items:center;gap:7px;}
.attempted-badge-icon{font-size:1rem;}
.attempted-badge-text{font-size:0.78rem;font-weight:700;color:#15803d;}
.attempted-badge-sub{font-size:0.65rem;color:#16a34a;margin-top:1px;}
.attempted-badge-score{font-size:1rem;font-weight:800;color:#15803d;}

/* ATTEMPT RESULT CARD */
.attempt-badge{display:flex;align-items:center;justify-content:space-between;background:#f0f9ff;border-radius:10px;padding:10px 12px;margin-bottom:10px;border:1px solid #e0f2fe;}
.attempt-score{font-size:1.2rem;font-weight:800;color:#0ea5e9;font-family:'Poppins',sans-serif;}
.attempt-meta{font-size:0.68rem;color:#64748b;margin-top:2px;}
.hist-rank{font-size:0.85rem;font-weight:800;color:#0284c7;}

/* STATS */
.streak-card{background:linear-gradient(135deg,#0ea5e9,#0284c7);border-radius:16px;padding:18px;display:flex;align-items:center;gap:16px;margin-bottom:10px;color:#fff;}
.streak-fire{font-size:2rem;}
.streak-val{font-size:2rem;font-weight:800;line-height:1;}
.streak-lbl{font-size:0.72rem;opacity:0.8;margin-top:2px;}
.pb-card{background:#fff;border:1.5px solid #e0f2fe;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.pb-icon{font-size:2rem;}
.pb-val{font-size:1.5rem;font-weight:800;color:#0ea5e9;}
.pb-lbl{font-size:0.72rem;color:#64748b;margin-top:2px;}
.pb-test{font-size:0.72rem;color:#0284c7;font-weight:600;margin-top:2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-box{background:#fff;border:1.5px solid #e0f2fe;border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-size:1.4rem;font-weight:800;margin-bottom:2px;}
.stat-val.green{color:#16a34a;} .stat-val.blue{color:#0ea5e9;} .stat-val.red{color:#dc2626;} .stat-val.yellow{color:#d97706;}
.stat-lbl{font-size:0.68rem;color:#64748b;font-weight:600;}

/* BADGES */
.badges-row{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.badge-chip{background:#fff;border:1.5px solid #e0f2fe;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;opacity:0.5;}
.badge-chip.earned{opacity:1;border-color:#0ea5e9;}
.badge-icon{font-size:1.5rem;}
.badge-name{font-size:0.82rem;font-weight:700;color:#111827;}
.badge-desc{font-size:0.68rem;color:#64748b;margin-top:2px;}

/* WEAK AREAS */
.weak-item{background:#fff;border:1.5px solid #e0f2fe;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.weak-subj{font-size:0.82rem;font-weight:700;color:#111827;flex:1;}
.weak-track{flex:1;height:6px;background:#e0f2fe;border-radius:3px;overflow:hidden;}
.weak-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.weak-pct{font-size:0.75rem;font-weight:800;min-width:35px;text-align:right;}

/* LEADERBOARD */
.lb-card{background:#fff;border:1.5px solid #e0f2fe;border-radius:14px;overflow:hidden;margin-bottom:10px;}
.lb-header{background:#0ea5e9;color:#fff;font-size:0.75rem;font-weight:800;padding:9px 14px;text-transform:uppercase;letter-spacing:0.5px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f9ff;font-size:0.82rem;}
.lb-row:last-child{border-bottom:none;}
.lb-row.me{background:#e0f2fe;}
.lb-rank{width:28px;text-align:center;font-weight:800;color:#64748b;font-size:0.82rem;flex-shrink:0;}
.lb-rank.gold{color:#d97706;} .lb-rank.silver{color:#64748b;} .lb-rank.bronze{color:#92400e;}
.lb-name{flex:1;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-badge{font-size:0.6rem;background:#f1f5f9;color:#64748b;padding:2px 6px;border-radius:50px;font-weight:700;flex-shrink:0;}
.lb-score{font-weight:800;color:#0ea5e9;flex-shrink:0;}

/* R-RANK BAR */
.r-rank-bar{display:flex;gap:0;border:1.5px solid #e0f2fe;border-radius:12px;overflow:hidden;}
.r-rank-item{flex:1;padding:12px 8px;text-align:center;border-right:1px solid #e0f2fe;}
.r-rank-item:last-child{border-right:none;}
.r-rank-val{font-size:1.1rem;font-weight:800;color:#0ea5e9;}
.r-rank-lbl{font-size:0.65rem;color:#64748b;font-weight:600;margin-top:2px;}
.r-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.r-stat{background:#f0f9ff;border-radius:10px;padding:10px 6px;text-align:center;border:1px solid #e0f2fe;}
.r-stat-val{font-size:1.1rem;font-weight:800;}
.r-stat-lbl{font-size:0.65rem;color:#64748b;font-weight:600;margin-top:2px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-wrap{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:20px;padding-bottom:32px;}
.modal-handle{width:40px;height:4px;background:#e0f2fe;border-radius:2px;margin:0 auto 16px;cursor:pointer;}
.modal-close{position:absolute;top:16px;right:16px;background:#f1f5f9;border:none;width:30px;height:30px;border-radius:50%;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;}
.result-test-name{font-size:1rem;font-weight:800;color:#111827;text-align:center;margin-bottom:4px;}
.result-score-big{font-size:2.5rem;font-weight:800;color:#0ea5e9;text-align:center;line-height:1;}
.result-score-lbl{font-size:0.72rem;color:#64748b;text-align:center;margin-bottom:14px;margin-top:4px;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}
.empty-msg{font-size:0.82rem;color:#94a3b8;line-height:1.7;}

/* LOADING */
.loading-wrap{text-align:center;padding:30px;color:#94a3b8;font-size:0.82rem;}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid #e0f2fe;border-top-color:#0ea5e9;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class="back-btn" href="dashboard.html">← Back</a>
  <div class="header-title">SSC <span>HUSTLERS</span> — Live Tests</div>
  <div class="user-chip" id="userChip">👤 Loading...</div>
</header>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('live',this)">🔴 Active</button>
    <button class="tab-btn" onclick="switchTab('past',this)">📋 Past Tests</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📊 My Stats</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LIVE TAB -->
  <div class="section show" id="tab-live">
    <div class="loading-wrap" id="liveLoading"><span class="spinner"></span> Loading tests...</div>
    <div id="liveList"></div>
  </div>

  <!-- PAST TAB -->
  <div class="section" id="tab-past">
    <div class="loading-wrap" id="pastLoading"><span class="spinner"></span> Loading...</div>
    <div id="pastList"></div>
  </div>

  <!-- STATS TAB -->
  <div class="section" id="tab-stats">
    <div class="loading-wrap" id="statsLoading"><span class="spinner"></span> Loading stats...</div>
    <div id="statsList" style="display:none"></div>
    <div class="empty" id="statsEmpty" style="display:none">
      <div class="empty-icon">📊</div>
      <div class="empty-msg">Koi live test attempt nahi kiya abhi tak.<br>Active test do aur stats yahan dikhenge!</div>
    </div>
  </div>

</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="resultModal" onclick="if(event.target===this)closeResultModal()">
  <div style="position:relative;background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:20px;padding-bottom:32px;" id="resultModalContent"></div>
</div>

<script>
const SUPABASE_URL = 'https://wwfhoyxqlversdkdqcgd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZmhveXhxbHZlcnNka2RxY2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDAwMTMsImV4cCI6MjA4ODQ3NjAxM30.qaQp8LJXGxN6EfOoNPOgdhdNqY7M0nC2aR8fBSYejrw';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let myAttempts = [];
let allTests = [];

// ── DEVICE FINGERPRINT (same as live_test.html) ──
function getDeviceFingerprint() {
  const raw = [
    navigator.userAgent,
    navigator.language,
    screen.width + 'x' + screen.height,
    screen.colorDepth,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.hardwareConcurrency || '',
    navigator.platform || ''
  ].join('|');
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
    hash |= 0;
  }
  return 'fp_' + Math.abs(hash).toString(36);
}

// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'dashboard.html'; return; }
  currentUser = session.user;
  const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  document.getElementById('userChip').innerHTML = `👤 <span>${name}</span>`;
  await Promise.all([loadLiveTests(), loadMyAttempts()]);
}

// ── LOAD ALL LIVE TESTS ──
async function loadLiveTests() {
  const { data, error } = await sb.from('live_tests')
    .select('id, name, total_questions, duration_minutes, start_time, end_time, code, positive_marking, negative_marking')
    .eq('is_archived', false)
    .order('start_time', { ascending: false });

  document.getElementById('liveLoading').style.display = 'none';

  if (error || !data || data.length === 0) {
    document.getElementById('liveList').innerHTML = `
      <div class="empty"><div class="empty-icon">🔴</div>
      <div class="empty-msg">Abhi koi live test available nahi hai.<br>Jaldi aa raha hai — tuned raho!</div></div>`;
    return;
  }

  allTests = data;
  const now = new Date();
  const live     = data.filter(t => new Date(t.start_time) <= now && new Date(t.end_time) >= now);
  const upcoming = data.filter(t => new Date(t.start_time) > now);
  const ended    = data.filter(t => new Date(t.end_time) < now);

  let html = '';
  if (live.length > 0) {
    html += `<div class="sec-title"><span class="live-dot" style="display:inline-block"></span> Abhi Live</div>`;
    live.forEach(t => { html += buildLiveCard(t, 'live'); });
  }
  if (upcoming.length > 0) {
    html += `<div class="sec-title">🕐 Upcoming</div>`;
    upcoming.forEach(t => { html += buildLiveCard(t, 'upcoming'); });
  }
  if (ended.length > 0) {
    html += `<div class="sec-title">✅ Ended</div>`;
    ended.forEach(t => { html += buildLiveCard(t, 'ended'); });
  }
  document.getElementById('liveList').innerHTML = html;
}

function buildLiveCard(t, status) {
  const startFmt = new Date(t.start_time).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  const endFmt   = new Date(t.end_time).toLocaleString('en-IN',   { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  const pos = t.positive_marking || 2;
  const neg = t.negative_marking || 0.5;

  // Check if already attempted
  const myAttempt = myAttempts.find(a => a.live_test_id === t.id && a.submitted_at);

  let statusHtml = '';
  let btnHtml    = '';
  let iconClass  = '';
  let cardClass  = '';

  if (status === 'live') {
    statusHtml = `<div class="live-status"><span class="live-dot"></span> LIVE NOW</div>`;
    iconClass  = 'live-icon';
    cardClass  = 'live-card';

    if (myAttempt) {
      // Already attempted — show result badge + view result button
      btnHtml = `
        <div class="attempted-badge">
          <div class="attempted-badge-left">
            <div class="attempted-badge-icon">✅</div>
            <div>
              <div class="attempted-badge-text">Test de diya!</div>
              <div class="attempted-badge-sub">Score: ${myAttempt.score} pts &nbsp;·&nbsp; ✅${myAttempt.correct} ❌${myAttempt.wrong} ⏭${myAttempt.skipped}</div>
            </div>
          </div>
          <div class="attempted-badge-score">${myAttempt.score}</div>
        </div>
        <button class="attempt-btn already" onclick="openResultModal('${myAttempt.id}')">📊 Result Dekho →</button>`;
    } else {
      btnHtml = `<button class="attempt-btn" onclick="goToTest('${t.code}')">🚀 Test Do Abhi →</button>`;
    }

  } else if (status === 'upcoming') {
    statusHtml = `<div class="upcoming-status">⏰ Starts: ${startFmt}</div>`;
    iconClass  = 'upcoming-icon';
    btnHtml    = `<button class="attempt-btn disabled" disabled>🔒 Jaldi Aayega</button>`;

  } else {
    // ended
    statusHtml = `<div class="ended-status">Ended: ${endFmt}</div>`;
    iconClass  = 'past-icon';
    cardClass  = 'past';

    if (myAttempt) {
      btnHtml = `
        <div class="attempted-badge">
          <div class="attempted-badge-left">
            <div class="attempted-badge-icon">📝</div>
            <div>
              <div class="attempted-badge-text">Attempt kiya tha</div>
              <div class="attempted-badge-sub">Score: ${myAttempt.score} pts &nbsp;·&nbsp; ✅${myAttempt.correct} ❌${myAttempt.wrong} ⏭${myAttempt.skipped}</div>
            </div>
          </div>
          <div class="attempted-badge-score">${myAttempt.score}</div>
        </div>
        <button class="attempt-btn secondary" onclick="openResultModal('${myAttempt.id}')">📊 Result & Solutions →</button>`;
    } else {
      btnHtml = `<button class="attempt-btn disabled" disabled>⏰ Test Khatam Ho Gaya</button>`;
    }
  }

  return `
    <div class="test-card ${cardClass}">
      <div class="card-top">
        <div class="card-icon ${iconClass}">${status === 'live' ? '🔴' : status === 'upcoming' ? '📅' : '✅'}</div>
        <div class="card-info">
          <div class="card-name">${t.name}</div>
          <div class="card-meta">
            <span class="pill blue">❓ ${t.total_questions} Qs</span>
            <span class="pill yellow">⏱ ${t.duration_minutes} min</span>
            <span class="pill green">+${pos}</span>
            <span class="pill red">-${neg}</span>
          </div>
          ${statusHtml}
        </div>
      </div>
      ${btnHtml}
    </div>`;
}

// ── LOAD MY ATTEMPTS ──
async function loadMyAttempts() {
  const fp = getDeviceFingerprint();

  // Registered user ke attempts (user_id se)
  const { data: regData } = await sb.from('live_test_attempts')
    .select('id, score, correct, wrong, skipped, submitted_at, live_test_id, participant_name, user_id, is_registered, answers')
    .eq('user_id', currentUser.id)
    .not('submitted_at', 'is', null)
    .order('submitted_at', { ascending: false });

  // Guest attempts bhi fetch karo (device_fingerprint se)
  const { data: guestData } = await sb.from('live_test_attempts')
    .select('id, score, correct, wrong, skipped, submitted_at, live_test_id, participant_name, user_id, is_registered, answers')
    .eq('device_fingerprint', fp)
    .not('submitted_at', 'is', null)
    .order('submitted_at', { ascending: false });

  // Dono merge karo, duplicate IDs hata do
  const all = [...(regData || []), ...(guestData || [])];
  const seen = new Set();
  myAttempts = all.filter(a => {
    if (seen.has(a.id)) return false;
    seen.add(a.id);
    return true;
  });

  renderPastTests();
  renderStats();
}

// ── PAST TESTS TAB ──
async function renderPastTests() {
  document.getElementById('pastLoading').style.display = 'none';

  if (!myAttempts.length) {
    document.getElementById('pastList').innerHTML = `
      <div class="empty"><div class="empty-icon">📋</div>
      <div class="empty-msg">Abhi tak koi test attempt nahi kiya.<br>Live test do aur result yahan aayega!</div></div>`;
    return;
  }

  // Get test names
  const testIds = [...new Set(myAttempts.map(a => a.live_test_id))];
  const { data: tests } = await sb.from('live_tests').select('id, name').in('id', testIds);
  const testMap = {};
  (tests || []).forEach(t => testMap[t.id] = t);

  // Get all attempts for these tests (for rank calculation)
  const { data: allAttempts } = await sb.from('live_test_attempts')
    .select('id, score, live_test_id, participant_name, user_id, is_registered, submitted_at')
    .in('live_test_id', testIds)
    .not('submitted_at', 'is', null);
  const allAtt = allAttempts || [];

  let html = `<div class="sec-title">📋 Mere Attempts (${myAttempts.length})</div>`;

  for (const a of myAttempts) {
    const test    = testMap[a.live_test_id] || {};
    const dateFmt = new Date(a.submitted_at).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

    // Rank calculation
    const sameTest = allAtt.filter(x => x.live_test_id === a.live_test_id);
    sameTest.sort((x,y) => (y.score||0) - (x.score||0));
    const rank  = sameTest.findIndex(x => x.id === a.id) + 1;
    const total = sameTest.length;

    // Mini leaderboard top 3
    const top3 = sameTest.slice(0,3);
    let lbHtml = `<div class="lb-card"><div class="lb-header">🏆 Leaderboard</div>`;
    top3.forEach((entry, i) => {
      const isMe      = entry.id === a.id;
      const rankEmoji = i===0?'🥇':i===1?'🥈':'🥉';
      const rankClass = i===0?'gold':i===1?'silver':'bronze';
      lbHtml += `
        <div class="lb-row ${isMe?'me':''}">
          <div class="lb-rank ${rankClass}">${rankEmoji}</div>
          <div class="lb-name">${entry.participant_name||'Student'} ${isMe?'<span style="color:#0ea5e9;font-size:0.65rem;">(You)</span>':''}</div>
          ${!entry.is_registered?'<span class="lb-badge">Guest</span>':''}
          <div class="lb-score">${(entry.score||0)}</div>
        </div>`;
    });
    lbHtml += `</div>`;

    html += `
      <div class="test-card past">
        <div class="card-top">
          <div class="card-icon past-icon">📝</div>
          <div class="card-info">
            <div class="card-name">${test.name || 'Live Test'}</div>
            <div class="card-meta">
              <span class="pill green">✅ ${a.correct||0}</span>
              <span class="pill red">❌ ${a.wrong||0}</span>
              <span class="pill grey">⏭ ${a.skipped||0}</span>
            </div>
          </div>
        </div>
        <div class="attempt-badge">
          <div>
            <div class="attempt-score">${a.score||0} pts</div>
            <div class="attempt-meta">${dateFmt}</div>
          </div>
          <div style="text-align:right">
            <div class="hist-rank">Rank #${rank} / ${total}</div>
            <div class="attempt-meta">Total participants</div>
          </div>
        </div>
        <button class="attempt-btn secondary" style="margin-bottom:10px;" onclick="openResultModal('${a.id}')">📊 Full Result & Solutions →</button>
        ${lbHtml}
      </div>`;
  }

  document.getElementById('pastList').innerHTML = html;
}

// ── STATS TAB ──
async function renderStats() {
  document.getElementById('statsLoading').style.display = 'none';
  if (!myAttempts.length) { document.getElementById('statsEmpty').style.display='block'; return; }

  const totalTests   = myAttempts.length;
  const totalCorrect = myAttempts.reduce((s,a) => s+(a.correct||0), 0);
  const totalWrong   = myAttempts.reduce((s,a) => s+(a.wrong||0), 0);
  const totalSkipped = myAttempts.reduce((s,a) => s+(a.skipped||0), 0);
  const totalQ       = totalCorrect + totalWrong + totalSkipped || 1;
  const accuracy     = Math.round((totalCorrect/totalQ)*100);
  const bestScore    = Math.max(...myAttempts.map(a=>a.score||0));
  const bestAttempt  = myAttempts.find(a=>(a.score||0)===bestScore);

  // Streak
  const dates = myAttempts.map(a=>new Date(a.submitted_at).toDateString());
  const uniqueDates = [...new Set(dates)].sort((a,b)=>new Date(b)-new Date(a));
  let streak = 0;
  const today = new Date();
  for (let i=0;i<uniqueDates.length;i++){
    const diff = Math.floor((today-new Date(uniqueDates[i]))/(1000*60*60*24));
    if (diff===i||diff===i+1) streak++; else break;
  }

  const {data:bestTestData} = bestAttempt
    ? await sb.from('live_tests').select('name').eq('id',bestAttempt.live_test_id).single()
    : {data:null};

  const gold   = totalTests>=5 && accuracy>=80;
  const silver = totalTests>=3 && accuracy>=60;
  const bronze = totalTests>=1;

  const subjects = [
    {name:'Reasoning', wrong:Math.round(totalWrong*0.3), total:Math.round(totalQ*0.25)},
    {name:'Maths',     wrong:Math.round(totalWrong*0.35),total:Math.round(totalQ*0.25)},
    {name:'English',   wrong:Math.round(totalWrong*0.2), total:Math.round(totalQ*0.25)},
    {name:'GK/GS',     wrong:Math.round(totalWrong*0.15),total:Math.round(totalQ*0.25)},
  ].map(s=>({...s,pct:s.total?Math.round((s.wrong/s.total)*100):0}))
   .sort((a,b)=>b.pct-a.pct);

  const el = document.getElementById('statsList');
  el.style.display = 'block';
  el.innerHTML = `
    <div class="streak-card">
      <div class="streak-fire">🔥</div>
      <div><div class="streak-val">${streak}</div><div class="streak-lbl">Day Streak</div></div>
      <div style="margin-left:auto;text-align:right;">
        <div style="font-size:0.72rem;opacity:0.8;">Tests attempted</div>
        <div style="font-size:1.6rem;font-weight:800;">${totalTests}</div>
      </div>
    </div>

    <div class="pb-card">
      <div class="pb-icon">🏆</div>
      <div>
        <div class="pb-val">${bestScore}</div>
        <div class="pb-lbl">Personal Best Score</div>
        <div class="pb-test">${bestTestData?.name||'Live Test'}</div>
      </div>
    </div>

    <div class="sec-title">📈 Overall Performance</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val green">${accuracy}%</div><div class="stat-lbl">Accuracy</div></div>
      <div class="stat-box"><div class="stat-val blue">${totalCorrect}</div><div class="stat-lbl">Total Correct</div></div>
      <div class="stat-box"><div class="stat-val red">${totalWrong}</div><div class="stat-lbl">Total Wrong</div></div>
      <div class="stat-box"><div class="stat-val yellow">${totalSkipped}</div><div class="stat-lbl">Total Skipped</div></div>
    </div>

    <div class="sec-title">🏅 Badges</div>
    <div class="badges-row">
      <div class="badge-chip ${gold?'earned':''}">
        <div class="badge-icon">${gold?'🥇':'🔒'}</div>
        <div class="badge-info"><div class="badge-name">Gold</div><div class="badge-desc">5+ tests, 80%+ accuracy</div></div>
      </div>
      <div class="badge-chip ${silver?'earned':''}">
        <div class="badge-icon">${silver?'🥈':'🔒'}</div>
        <div class="badge-info"><div class="badge-name">Silver</div><div class="badge-desc">3+ tests, 60%+ accuracy</div></div>
      </div>
      <div class="badge-chip ${bronze?'earned':''}">
        <div class="badge-icon">${bronze?'🥉':'🔒'}</div>
        <div class="badge-info"><div class="badge-name">Bronze</div><div class="badge-desc">Pehla test attempt karo</div></div>
      </div>
    </div>

    <div class="sec-title">⚠️ Weak Areas (Estimated)</div>
    ${subjects.map(s=>{
      const col = s.pct>=60?'#dc2626':s.pct>=35?'#d97706':'#16a34a';
      return `<div class="weak-item">
        <div class="weak-subj">${s.name}</div>
        <div class="weak-track"><div class="weak-fill" style="width:${s.pct}%;background:${col};"></div></div>
        <div class="weak-pct" style="color:${col};">${s.pct}%</div>
      </div>`;
    }).join('')}`;
}

// ── NAVIGATE TO TEST ──
function goToTest(code) {
  window.location.href = `live_test.html?code=${code}`;
}

// ── TAB SWITCH ──
function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('show');
  if (btn) btn.classList.add('active');
}

// ── RESULT MODAL ──
async function openResultModal(attemptId) {
  const attempt = myAttempts.find(a => a.id === attemptId);
  if (!attempt) return;

  const testName  = allTests.find(t => t.id === attempt.live_test_id)?.name || 'Live Test';
  const score     = attempt.score || 0;
  const correct   = attempt.correct || 0;
  const wrong     = attempt.wrong || 0;
  const skipped   = attempt.skipped || 0;
  const attempted = correct + wrong;
  const accuracy  = attempted > 0 ? Math.round((correct/attempted)*100) : 0;
  const dateFmt   = new Date(attempt.submitted_at).toLocaleString('en-IN', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const studentAnswers = JSON.parse(attempt.answers || '{}');

  const el = document.getElementById('resultModalContent');
  el.innerHTML = `
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeResultModal()">✕</button>
    <div class="result-test-name">${testName}</div>
    <div style="text-align:center;font-size:0.72rem;color:#64748b;margin-bottom:12px;">${dateFmt}</div>
    <div class="result-score-big">${score}</div>
    <div class="result-score-lbl">Total Score</div>
    <div class="r-stats-grid">
      <div class="r-stat"><div class="r-stat-val" style="color:#16a34a">${correct}</div><div class="r-stat-lbl">Correct</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#dc2626">${wrong}</div><div class="r-stat-lbl">Wrong</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#64748b">${skipped}</div><div class="r-stat-lbl">Skipped</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#0ea5e9">${accuracy}%</div><div class="r-stat-lbl">Accuracy</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#111827">${attempted}</div><div class="r-stat-lbl">Attempted</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#111827">${correct+wrong+skipped}</div><div class="r-stat-lbl">Total Qs</div></div>
    </div>
    <div class="tabs-wrap" style="position:static;margin:0 -20px 14px;padding:0 20px;">
      <div class="tabs">
        <button class="tab-btn active" id="rtab-lb"       onclick="switchResultTab('lb')">🏆 Leaderboard</button>
        <button class="tab-btn"        id="rtab-subject"  onclick="switchResultTab('subject')">📊 Subject</button>
        <button class="tab-btn"        id="rtab-analysis" onclick="switchResultTab('analysis')">🔍 Analysis</button>
      </div>
    </div>
    <div id="rtab-content-lb"><div class="loading-wrap"><span class="spinner"></span> Loading...</div></div>
    <div id="rtab-content-subject"  style="display:none;"><div class="loading-wrap"><span class="spinner"></span> Loading...</div></div>
    <div id="rtab-content-analysis" style="display:none;"><div class="loading-wrap"><span class="spinner"></span> Loading...</div></div>
  `;
  document.getElementById('resultModal').classList.add('show');

  const [lbRes, qRes] = await Promise.all([
    sb.from('live_test_attempts')
      .select('participant_name, score, is_registered, user_id')
      .eq('live_test_id', attempt.live_test_id)
      .not('submitted_at','is',null)
      .order('score',{ascending:false}),
    sb.from('live_test_questions')
      .select('id,q_order,question_text,option_a,option_b,option_c,option_d,correct_answer,explanation,subject')
      .eq('live_test_id', attempt.live_test_id)
      .order('q_order',{ascending:true})
  ]);

  const lbData    = lbRes.data || [];
  const questions = qRes.data  || [];
  const myRank    = lbData.findIndex(a => (currentUser && a.user_id===currentUser.id) || a.participant_name===attempt.participant_name) + 1;
  const total     = lbData.length;
  const percentile = myRank>0&&total>0 ? Math.round(((total-myRank)/total)*100) : 0;

  // ── LEADERBOARD ──
  let lbHtml = '';
  if (myRank > 0) {
    lbHtml += `<div class="r-rank-bar" style="margin-bottom:14px;">
      <div class="r-rank-item"><div class="r-rank-val">#${myRank}</div><div class="r-rank-lbl">Your Rank</div></div>
      <div class="r-rank-item"><div class="r-rank-val">${total}</div><div class="r-rank-lbl">Students</div></div>
      <div class="r-rank-item"><div class="r-rank-val">${percentile}%</div><div class="r-rank-lbl">Percentile</div></div>
    </div>`;
  }
  lbHtml += `<div class="lb-card"><div class="lb-header">🏆 Top Scorers</div>`;
  lbData.slice(0,15).forEach((entry,i) => {
    const isMe      = (currentUser&&entry.user_id===currentUser.id)||entry.participant_name===attempt.participant_name;
    const rankEmoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    lbHtml += `<div class="lb-row ${isMe?'me':''}">
      <div class="lb-rank ${rankClass}">${rankEmoji}</div>
      <div class="lb-name">${entry.participant_name||'Student'} ${isMe?'<span style="color:#0ea5e9;font-size:0.65rem;">(You)</span>':''}</div>
      ${!entry.is_registered?'<span class="lb-badge">Guest</span>':''}
      <div class="lb-score">${entry.score||0}</div>
    </div>`;
  });
  lbHtml += `</div>`;
  document.getElementById('rtab-content-lb').innerHTML = lbHtml;

  // ── SUBJECT BREAKDOWN ──
  const subjectMap = {};
  questions.forEach((q,idx) => {
    const subj = q.subject||'Other';
    if (!subjectMap[subj]) subjectMap[subj]={correct:0,wrong:0,skipped:0,total:0};
    subjectMap[subj].total++;
    const sa = (studentAnswers[String(idx)]||studentAnswers[String(q.q_order)]||'').toUpperCase();
    if (!sa) subjectMap[subj].skipped++;
    else if (sa===q.correct_answer.toUpperCase()) subjectMap[subj].correct++;
    else subjectMap[subj].wrong++;
  });
  let subjHtml = '<div class="sec-title" style="margin-top:0">📊 Subject-wise Performance</div>';
  if (Object.keys(subjectMap).length===0) {
    subjHtml += `<div class="empty"><div class="empty-icon">📊</div><div class="empty-msg">Subject data available nahi hai.</div></div>`;
  } else {
    Object.entries(subjectMap).forEach(([subj,s]) => {
      const acc      = s.total>0?Math.round((s.correct/s.total)*100):0;
      const barColor = acc>=70?'#16a34a':acc>=40?'#d97706':'#dc2626';
      subjHtml += `<div class="weak-item" style="flex-direction:column;align-items:stretch;gap:8px;padding:14px;">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:0.88rem;font-weight:700;color:#111827;">${subj}</div>
          <div style="font-size:0.82rem;font-weight:800;color:${barColor}">${acc}%</div>
        </div>
        <div style="display:flex;gap:12px;">
          <span style="font-size:0.72rem;color:#16a34a">✅ ${s.correct}</span>
          <span style="font-size:0.72rem;color:#dc2626">❌ ${s.wrong}</span>
          <span style="font-size:0.72rem;color:#64748b">⏭ ${s.skipped}</span>
          <span style="font-size:0.72rem;color:#94a3b8">Total: ${s.total}</span>
        </div>
        <div class="weak-track"><div class="weak-fill" style="width:${acc}%;background:${barColor};"></div></div>
      </div>`;
    });
  }
  document.getElementById('rtab-content-subject').innerHTML = subjHtml;

  // ── ANALYSIS ──
  function renderAnalysis(filter) {
    let html = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
      ${['all','correct','wrong','skipped'].map(f=>`
        <button onclick="window.renderAnalysis('${f}')" style="
          padding:6px 12px;border-radius:8px;border:1.5px solid;font-family:inherit;cursor:pointer;
          background:${f===filter?'#0ea5e9':'#fff'};
          color:${f===filter?'#fff':'#64748b'};
          border-color:${f===filter?'#0ea5e9':'#e0f2fe'};
          font-size:0.72rem;font-weight:700;">
          ${f==='all'?'All':f==='correct'?'✅ Correct':f==='wrong'?'❌ Wrong':'⏭ Skipped'}
        </button>`).join('')}
    </div>`;

    let count = 0;
    questions.forEach((q,idx) => {
      const sa  = (studentAnswers[String(idx)]||studentAnswers[String(q.q_order)]||'').toUpperCase();
      const ca  = (q.correct_answer||'').toUpperCase();
      const isSkip    = !sa;
      const isCorrect = !isSkip && sa===ca;
      const isWrong   = !isSkip && !isCorrect;
      if (filter==='correct'&&!isCorrect) return;
      if (filter==='wrong'  &&!isWrong  ) return;
      if (filter==='skipped'&&!isSkip   ) return;
      count++;
      const statusColor = isCorrect?'#16a34a':isWrong?'#dc2626':'#64748b';
      const statusLabel = isCorrect?'✅ Correct':isWrong?'❌ Wrong':'⏭ Skipped';
      html += `<div style="background:#fff;border:1.5px solid #e0f2fe;border-radius:12px;padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:0.72rem;font-weight:700;color:#64748b;">Q${idx+1}${q.subject?' · '+q.subject:''}</span>
          <span style="font-size:0.72rem;font-weight:800;color:${statusColor};">${statusLabel}</span>
        </div>
        <div style="font-size:0.85rem;color:#111827;line-height:1.5;margin-bottom:10px;">${q.question_text}</div>
        <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:${q.explanation?'10px':'0'};">
          ${['A','B','C','D'].map(opt=>{
            const optText    = q['option_'+opt.toLowerCase()]||'';
            if (!optText) return '';
            const isCorrectO = opt===ca;
            const isStudentO = opt===sa;
            let bg='#f8fafc',border='#e0f2fe',col='#64748b',icon='';
            if (isCorrectO){bg='#dcfce7';border='#86efac';col='#16a34a';icon='✅ ';}
            if (isStudentO&&!isCorrectO){bg='#fee2e2';border='#fca5a5';col='#dc2626';icon='❌ ';}
            return `<div style="background:${bg};border:1.5px solid ${border};border-radius:8px;padding:8px 10px;font-size:0.78rem;color:${col};">
              ${icon}<strong>${opt}.</strong> ${optText}
              ${isStudentO&&!isCorrectO?'<span style="font-size:0.65rem;"> (Aapka jawab)</span>':''}
              ${isCorrectO?'<span style="font-size:0.65rem;"> (Sahi jawab)</span>':''}
            </div>`;
          }).join('')}
        </div>
        ${q.explanation?`<div style="background:#e0f2fe;border:1.5px solid #bae6fd;border-radius:8px;padding:10px;font-size:0.78rem;color:#0284c7;line-height:1.5;">
          💡 <strong>Explanation:</strong> ${q.explanation}</div>`:''}
      </div>`;
    });
    if (count===0) html += `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">Is filter mein koi question nahi.</div></div>`;
    document.getElementById('rtab-content-analysis').innerHTML = html;
  }
  window.renderAnalysis = renderAnalysis;
  renderAnalysis('all');

  document.getElementById('rtab-content-subject').style.display  = 'none';
  document.getElementById('rtab-content-analysis').style.display = 'none';
}

function switchResultTab(tab) {
  ['lb','subject','analysis'].forEach(t => {
    document.getElementById('rtab-content-'+t).style.display = t===tab?'block':'none';
    const btn = document.getElementById('rtab-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
  });
}

function closeResultModal() {
  document.getElementById('resultModal').classList.remove('show');
}

init();
</script>
